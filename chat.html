<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ATIG Chat</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #0b1a2a, #000);
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.message {
  margin: 10px 0;
}

.user { color: #4da3ff; }
.bot { color: #ffffff; }

#input {
  display: flex;
  padding: 10px;
  background: #111;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  background: #4da3ff;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="chat"></div>

<div id="input">
  <input id="msg" placeholder="Спроси ATIG..." />
  <button onclick="send()">➤</button>
</div>

<script>
async function send() {
  const input = document.getElementById('msg');
  const text = input.value;
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';

  const res = await fetch('http://localhost:8000/agent', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ query: text })
  });

  const data = await res.json();
  addMessage(data.answer, 'bot');
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'message ' + type;
  div.innerText = text;
  document.getElementById('chat').appendChild(div);
}
</script>

</body>
</html>
