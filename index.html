<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КАРТА ВСЕЛЕННОЙ ATIG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: radial-gradient(circle at center, #0a0a2a 0%, #000011 100%); }
    .glass { background: rgba(15,23,42,0.85); backdrop-filter: blur(16px); }
    .neon-core { animation: corePulse 6s ease-in-out infinite; }
    @keyframes corePulse {
      0%,100% { box-shadow: 0 0 70px #67e8f9, 0 0 120px #22d3ee; }
      50% { box-shadow: 0 0 100px #67e8f9, 0 0 160px #22d3ee; }
    }
  </style>
</head>
<body class="min-h-screen py-12 relative overflow-hidden">

  <!-- SVG Connections -->
  <svg class="absolute inset-0 w-full h-full pointer-events-none z-0" style="top:0;left:0;">
    <defs>
      <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Пример соединительных линий от ядра -->
    <path d="M 580 380 Q 400 280 280 420" fill="none" stroke="#67e8f9" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
    <path d="M 620 380 Q 800 280 920 420" fill="none" stroke="#67e8f9" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  </svg>

  <div class="max-w-7xl mx-auto px-6 relative z-10">
    <h1 class="text-6xl font-bold text-center mb-4">КАРТА ВСЕЛЕННОЙ ATIG</h1>
    <p class="text-center text-cyan-300 text-2xl mb-20">Архитектура персонального ИИ нового поколения</p>

    <!-- Центральное ядро -->
    <div class="flex justify-center mb-24">
      <div onclick="showDetail('core')" class="neon-core w-96 h-96 rounded-full border-8 border-cyan-400 bg-gradient-to-br from-purple-950 to-blue-950 flex items-center justify-center cursor-pointer hover:scale-105 transition-all relative z-10">
        <div class="text-center">
          <div class="text-7xl font-black">ATIG</div>
          <div class="text-4xl">CORE (IG-01)</div>
        </div>
      </div>
    </div>

    <!-- Блоки вокруг (упрощённо) -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div onclick="showDetail('foundation')" class="glass rounded-3xl p-8 cursor-pointer">FOUNDATION LAYER</div>
      <div onclick="showDetail('intelligence')" class="glass rounded-3xl p-8 cursor-pointer">INTELLIGENCE LAYER</div>
      <div onclick="showDetail('agentic')" class="glass rounded-3xl p-8 cursor-pointer">AGENTIC LAYER</div>
      <div onclick="showDetail('governance')" class="glass rounded-3xl p-8 cursor-pointer">GOVERNANCE & SAFETY</div>
    </div>
  </div>

  <!-- Modal (как раньше) -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="glass max-w-2xl w-full m-4 p-10 rounded-3xl">
      <button onclick="closeModal()" class="float-right text-4xl">×</button>
      <h2 id="modalTitle" class="text-4xl font-bold text-cyan-300 mb-6"></h2>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    // Тот же скрипт модального окна, что был раньше...
    function showDetail(key) { /* ... */ }
    function closeModal() { /* ... */ }
  </script>
</body>
</html>
