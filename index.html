<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atig Systems</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #030712;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.12) 0%, rgba(0, 0, 0, 0) 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(40px);
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Интерактивный логотип с пульсирующим ИИ-ядром */
        .logo-container {
            margin-bottom: 35px;
            position: relative;
            display: inline-block;
            width: 80px;
            height: 80px;
        }

        .core {
            width: 22px;
            height: 22px;
            background-color: #f59e0b;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseCore 2.5s infinite ease-in-out;
            z-index: 3;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(56, 189, 248, 0.35);
            border-radius: 50%;
            z-index: 2;
        }

        .orbit-1 { width: 75px; height: 32px; transform: translate(-50%, -50%) rotate(30deg); animation: rotate1 12s linear infinite; }
        .orbit-2 { width: 75px; height: 32px; transform: translate(-50%, -50%) rotate(-30deg); animation: rotate2 12s linear infinite; }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .brand {
            color: #38bdf8;
            font-weight: 600;
        }

        .sub-brand {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.24rem;
            color: #6b7280;
            margin-bottom: 30px;
            font-weight: 400;
        }

        p {
            font-size: 0.95rem;
            color: #9ca3af;
            letter-spacing: 0.05rem;
            margin-bottom: 35px;
            font-weight: 300;
            line-height: 1.6;
        }

        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
        }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.15);
            padding: 4px 12px;
            border-radius: 4px;
            background: rgba(7, 11, 25, 0.3);
        }

        .btn-connect {
            display: inline-block;
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            color: #ffffff;
            padding: 15px 35px;
            border: 1px solid #38bdf8;
            border-radius: 4px;
            background: rgba(7, 11, 25, 0.6);
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
            margin-bottom: 45px;
        }

        .btn-connect:hover {
            background: #38bdf8;
            color: #030712;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5);
        }

        /* Стили цифрового ИИ-терминала */
        .ai-terminal {
            max-width: 450px;
            margin: 0 auto;
            background: rgba(17, 24, 39, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.1);
            border-radius: 6px;
            padding: 15px;
            text-align: left;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(55, 65, 81, 0.3);
            padding-bottom: 6px;
        }

        .terminal-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        .terminal-dot.yellow { background: #f59e0b; }
        .terminal-dot.green { background: #10b981; }

        .terminal-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #4b5563;
            letter-spacing: 0.1rem;
            margin-left: 4px;
        }

        .terminal-body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
            color: #38bdf8;
            line-height: 1.4;
            min-height: 38px;
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 13px;
            background: #38bdf8;
            margin-left: 2px;
            animation: blink 0.8s infinite;
            vertical-align: middle;
        }

        /* Анимации */
        @keyframes rotate1 {
            0% { transform: translate(-50%, -50%) rotate(30deg); }
            100% { transform: translate(-50%, -50%) rotate(390deg); }
        }

        @keyframes rotate2 {
            0% { transform: translate(-50%, -50%) rotate(-30deg); }
            100% { transform: translate(-50%, -50%) rotate(330deg); }
        }

        @keyframes pulseCore {
            0% { box-shadow: 0 0 12px #f59e0b; transform: translate(-50%, -50%) scale(0.95); }
            50% { box-shadow: 0 0 24px #f59e0b, 0 0 35px rgba(245, 158, 11, 0.4); transform: translate(-50%, -50%) scale(1.05); }
            100% { box-shadow: 0 0 12px #f59e0b; transform: translate(-50%, -50%) scale(0.95); }
        }

        @keyframes blink {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="core"></div>
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>
        </div>

        <h1><span class="brand">Atig</span> Systems</h1>
        <div class="sub-brand">Advanced Technologies Initiated by Genius</div>
        
        <p>Проектирование, монтаж и комплексный мониторинг интеллектуальных систем охранно-пожарной сигнализации и автоматики в Алматы.</p>

        <div class="tags">
            <div class="tag">Интеграция</div>
            <div class="tag">Безопасность</div>
            <div class="tag">Контроль</div>
        </div>

        <a href="tel:+77072562388" class="btn-connect">Установить связь</a>

        <div class="ai-terminal">
            <div class="terminal-header">
                <div class="terminal-dot"></div>
                <div class="terminal-dot yellow"></div>
                <div class="terminal-dot green"></div>
                <span class="terminal-title">atig_ai_core_v2.0.26</span>
            </div>
            <div class="terminal-body">
                <span id="ai-text"></span><span class="cursor"></span>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const text = "Atig_AI: ИИ-модуль запущен. Мониторинг безопасности систем в Алматы активен. Связь со специалистом стабильна...";
            let index = 0;
            const speed = 50; 
            const textField = document.getElementById("ai-text");

            function typeWriter() {
                if (index < text.length) {
                    textField.innerHTML += text.charAt(index);
                    index++;
                    setTimeout(typeWriter, speed);
                }
            }

            // Безопасный запуск без ожидания тяжелой графики
            setTimeout(typeWriter, 400);
        });
    </script>

</body>
</html>
