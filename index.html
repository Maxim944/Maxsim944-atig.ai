<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATIG SYSTEM</title>
    <style>
        /* Максимальный контраст: черный фон, ярко-желтый текст */
        body {
            background-color: #000000;
            color: #FFFF00; /* Ярко-желтый виден лучше всего на солнце */
            font-family: 'Arial Black', sans-serif; /* Жирный шрифт */
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            font-size: 40px; /* Очень крупный заголовок */
            text-align: center;
            padding: 20px 0;
            border-bottom: 5px solid #FFFF00;
            margin-bottom: 20px;
        }

        button {
            background: #222;
            color: #FFFF00;
            border: 4px solid #FFFF00;
            padding: 40px; /* Очень большие кнопки для нажатия пальцем */
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            background: #FFFF00;
            color: #000;
        }

        #display {
            font-size: 36px;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #111;
            border: 2px dashed #FFFF00;
        }
    </style>
</head>
<body>

    <div class="header">ATIG КОРПУС</div>

    <button onclick="ping()">ИНИЦИАЛИЗАЦИЯ</button>
    <button onclick="ping()">СКАНИРОВАНИЕ</button>
    <button onclick="ping()">СИНХРОНИЗАЦИЯ</button>

    <div id="display">READY</div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function ping() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.stop(audioCtx.currentTime + 0.2);
            
            document.getElementById('display').innerText = "SYSTEM ACTIVE";
        }
    </script>
</body>
</html>
