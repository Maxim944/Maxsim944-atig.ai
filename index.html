<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atig Intelligence Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #030712;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            padding: 40px 20px;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(40px);
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* Пульсирующее ядро мысли */
        .logo-container {
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
            width: 80px;
            height: 80px;
        }

        .core {
            width: 20px;
            height: 20px;
            background-color: #38bdf8;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: pulseCore 2.5s infinite ease-in-out;
            z-index: 3;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 50%;
            z-index: 2;
        }

        .orbit-1 { width: 70px; height: 28px; transform: translate(-50%, -50%) rotate(45deg); animation: rotate1 15s linear infinite; }

        h1 {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .brand {
            color: #38bdf8;
            font-weight: 600;
        }

        .sub-brand {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            color: #4b5563;
            margin-bottom: 30px;
        }

        /* Панель счета */
        .score-bar {
            max-width: 450px;
            margin: 0 auto 10px auto;
            display: flex;
            justify-content: space-between;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            color: #6b7280;
            padding: 0 5px;
        }

        .score-value {
            color: #fbbf24;
            font-weight: bold;
        }

        /* Терминал с загадкой */
        .ai-terminal {
            background: rgba(17, 24, 39, 0.5);
            border: 1px solid rgba(56, 189, 248, 0.15);
            border-radius: 6px;
            padding: 20px;
            text-align: left;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
            margin-bottom: 20px;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(55, 65, 81, 0.3);
            padding-bottom: 6px;
        }

        .terminal-dot { width: 7px; height: 7px; border-radius: 50%; background: #4b5563; }

        .terminal-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #6b7280;
            letter-spacing: 0.08rem;
        }

        .terminal-body {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #38bdf8;
            line-height: 1.5;
            min-height: 100px;
        }

        /* Форма ввода ответа */
        .input-group {
            display: flex;
            gap: 8px;
            max-width: 450px;
            margin: 0 auto;
        }

        .answer-input {
            flex: 1;
            background: rgba(17, 24, 39, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 4px;
            padding: 12px 15px;
            color: #ffffff;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .answer-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
        }

        .btn-submit {
            background: rgba(7, 11, 25, 0.6);
            border: 1px solid #38bdf8;
            color: #ffffff;
            padding: 0 25px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-submit:hover {
            background: #38bdf8;
            color: #030712;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        @keyframes rotate1 { 0% { transform: translate(-50%, -50%) rotate(45deg); } 100% { transform: translate(-50%, -50%) rotate(405deg); } }
        @keyframes pulseCore {
            0%, 100% { box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); transform: translate(-50%, -50%) scale(0.95); }
            50% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.7); transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Ядро -->
        <div class="logo-container">
            <div class="core"></div>
            <div class="orbit orbit-1"></div>
        </div>

        <!-- Заголовки -->
        <h1><span class="brand">Atig</span> Riddle</h1>
        <div class="sub-brand">Модуль проверки нестандартного мышления</div>

        <!-- Панель баллов -->
        <div class="score-bar">
            <span>СТАТУС: АКТИВЕН</span>
            <span>ВАШИ БАЛЛЫ: <span id="score-count" class="score-value">0</span></span>
        </div>

        <!-- Терминал -->
        <div class="ai-terminal">
            <div class="terminal-header">
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
                <span class="terminal-title">system_riddle_v1.0</span>
            </div>
            <div class="terminal-body">
                <span id="terminal-text"></span>
            </div>
        </div>

        <!-- Поле ввода ответа -->
        <div class="input-group">
            <input type="text" id="user-answer" class="answer-input" placeholder="Введите ваш ответ..." autocomplete="off">
            <button class="btn-submit" onclick="checkAnswer()">Запуск</button>
        </div>
    </div>

    <script>
        // Загадка и правильные варианты ответа (в нижнем регистре для точности)
        const riddleText = "Загадка Сфинкса XXI века:\nЯ не имею плоти, но храню твою память. Я не имею голоса, но говорю твоими мыслями через века. Я бессмертен, пока жив последний узел сети. Что я?";
        
        // Массив возможных правильных ответов пользователя
        const validAnswers = ["ии", "искусственный интеллект", "код", "цифровой след", "интернет", "atig", "атиг"];

        let score = 0;
        let currentTimeout = null;
        const textField = document.getElementById("terminal-text");

        function typeWriter(text, index) {
            if (index < text.length) {
                // Корректно обрабатываем переносы строк \n
                if (text.charAt(index) === '\n') {
                    textField.innerHTML += '<br>';
                } else {
                    textField.innerHTML += text.charAt(index);
                }
                currentTimeout = setTimeout(() => typeWriter(text, index + 1), 30);
            }
        }

        function checkAnswer() {
            const inputField = document.getElementById("user-answer");
            const userAnswer = inputField.value.trim().toLowerCase();
            
            if (!userAnswer) return;

            if (currentTimeout) clearTimeout(currentTimeout);
            textField.innerHTML = "Анализ ответа в ядре системы... ";

            setTimeout(() => {
                textField.innerHTML = "";
                
                if (validAnswers.includes(userAnswer)) {
                    score += 100;
                    document.getElementById("score-count").innerHTML = score;
                    textField.style.color = "#10b981"; // Зеленый при успехе
                    typeWriter("ДОСТУП РАЗРЕШЕН. Ответ принят. Начислено +100 баллов. Вы прошли тест ядра. Код верификации: ATIG_SUCCESS_2026.", 0);
                } else {
                    if (score > 0) score -= 25; // Штраф за ошибку
                    document.getElementById("score-count").innerHTML = score;
                    textField.style.color = "#ef4444"; // Красный при ошибке
                    typeWriter("ОШИБКА ДОСТУПА. Ответ неверен. Синхронизация нарушена. Попробуйте взглянуть на проблему шире.", 0);
                }
                inputField.value = ""; // Очищаем поле ввода
            }, 600);
        }

        // Стартовый запуск
        document.addEventListener("DOMContentLoaded", function() {
            typeWriter(riddleText, 0);
        });
    </script>

</body>
</html>
