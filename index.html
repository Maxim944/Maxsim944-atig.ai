<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIG.AI — Персональный интеллект</title>

    <!-- SEO -->
    <meta name="description" content="ATIG — персональный искусственный интеллект, сопровождающий человека от рождения до вечности.">
    <meta name="keywords" content="ATIG, AI, искусственный интеллект, персональный ассистент">
    <meta name="author" content="ATIG.AI">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00e5ff;
            --accent-glow: rgba(0,229,255,0.4);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        html { scroll-behavior: smooth; }

        body {
            background:#000510;
            min-height:100vh;
            font-family:'Raleway',sans-serif;
            color:#fff;
            overflow-x:hidden;
            line-height:1.6;
        }

        /* ================= COSMOS ================= */
        .cosmos {
            position:fixed;
            inset:0;
            background:radial-gradient(ellipse 100% 60% at 50% 40%,#0a1a3e 0%,transparent 70%),#000208;
            z-index:0;
        }
        .milkyway {
            position:absolute;
            inset:0;
            background:radial-gradient(ellipse 140% 25% at 50% 52%,rgba(120,160,255,0.12) 0%,transparent 70%);
            transform:rotate(-12deg) scale(1.6);
            z-index:1;
        }
        .stars { position:absolute; inset:0; z-index:2; }
        .star {
            position:absolute;
            border-radius:50%;
            background:#fff;
            animation:twinkle var(--d) ease-in-out infinite;
            box-shadow:0 0 6px #fff;
        }
        @keyframes twinkle { 0%,100%{opacity:var(--lo)} 50%{opacity:var(--hi)} }

        /* ================= NAVIGATION ================= */
        nav {
            position:fixed;
            top:0;
            width:100%;
            padding:20px 5%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            z-index:100;
            background:rgba(0,5,16,0.85);
            backdrop-filter:blur(12px);
            flex-wrap:wrap;
            gap:15px;
        }
        .nav-logo {
            font-size:28px;
            font-weight:600;
            color:var(--accent);
            letter-spacing:8px;
            text-shadow:0 0 30px var(--accent);
        }
        .nav-links { display:flex; gap:25px; flex-wrap:wrap; }
        .nav-links a {
            color:rgba(255,255,255,0.7);
            text-decoration:none;
            font-size:13px;
            letter-spacing:2px;
            transition:all 0.3s;
        }
        .nav-links a:hover { color:var(--accent); }

        .lang-switch {
            background:transparent;
            border:1px solid var(--accent);
            color:var(--accent);
            padding:6px 14px;
            border-radius:30px;
            cursor:pointer;
            font-size:12px;
            letter-spacing:1px;
        }

        section {
            position:relative;
            z-index:10;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            padding:100px 20px;
            text-align:center;
        }

        .hero-title {
            font-size:13px;
            letter-spacing:8px;
            color:rgba(200,230,255,0.5);
            text-transform:uppercase;
            margin-bottom:15px;
        }
        .hero-logo {
            font-size:clamp(48px,12vw,92px);
            font-weight:600;
            color:var(--accent);
            letter-spacing:clamp(8px,4vw,18px);
            text-shadow:0 0 50px var(--accent),0 0 100px var(--accent-glow);
        }
        .hero-sub {
            font-size:clamp(11px,3vw,16px);
            letter-spacing:clamp(3px,1.5vw,5px);
            color:rgba(125,211,252,0.5);
            margin-bottom:50px;
        }

        /* ================= ATOM ================= */
        .atom-wrap {
            position:relative;
            width:min(280px,70vw);
            height:min(280px,70vw);
            margin:40px 0;
            cursor:pointer;
        }
        .orbit {
            position:absolute;
            top:50%;
            left:50%;
            border:1.8px solid rgba(100,190,255,0.4);
            border-radius:50%;
            transform:translate(-50%,-50%);
        }
        .o1 { width:100%; height:37%; animation:orbit1 6s linear infinite; }
        .o2 { width:84%; height:31%; animation:orbit2 8s linear infinite; }
        .o3 { width:68%; height:26%; animation:orbit3 10s linear infinite; }

        @keyframes orbit1 { from{transform:translate(-50%,-50%) rotate(0)} to{transform:translate(-50%,-50%) rotate(360deg)} }
        @keyframes orbit2 { from{transform:translate(-50%,-50%) rotate(45deg)} to{transform:translate(-50%,-50%) rotate(405deg)} }
        @keyframes orbit3 { from{transform:translate(-50%,-50%) rotate(-60deg)} to{transform:translate(-50%,-50%) rotate(300deg)} }

        .electron {
            position:absolute;
            width:7px;
            height:7px;
            background:#fff;
            border-radius:50%;
            box-shadow:0 0 12px #fff,0 0 20px var(--accent);
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
        }
        .nucleus {
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            width:24%;
            height:24%;
            border-radius:50%;
            background:radial-gradient(circle at 35% 35%,#fff 0%,#bae6fd 25%,#38bdf8 55%,#0c4a6e 100%);
            box-shadow:0 0 30px rgba(125,211,252,0.9),0 0 70px rgba(56,189,248,0.7);
        }

        .hero-msg {
            max-width:520px;
            margin:30px auto;
            font-size:18px;
            font-weight:300;
        }

        .open-chat-btn {
            margin-top:20px;
            padding:14px 32px;
            border:2px solid var(--accent);
            color:var(--accent);
            background:transparent;
            border-radius:50px;
            cursor:pointer;
            letter-spacing:2px;
        }

        /* ================= DOCS ================= */
        .section-title {
            font-size:12px;
            letter-spacing:6px;
            color:rgba(125,211,252,0.45);
            text-transform:uppercase;
            margin-bottom:30px;
        }

        .about-grid, .docs-grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:25px;
            max-width:1100px;
            width:100%;
        }

        .about-card, .doc-card {
            padding:30px;
            border:1px solid rgba(0,229,255,0.15);
            border-radius:16px;
            background:rgba(0,10,30,0.6);
            backdrop-filter:blur(10px);
            text-align:left;
        }

        .about-card h3, .doc-card h3 {
            color:var(--accent);
            margin-bottom:10px;
        }

        .doc-status {
            display:inline-block;
            padding:5px 14px;
            border-radius:30px;
            font-size:12px;
            letter-spacing:1px;
        }
        .doc-status.coming {
            background:rgba(255,165,0,0.1);
            border:1px solid rgba(255,165,0,0.3);
            color:#ffa500;
        }
        .doc-status.dev {
            background:rgba(0,229,255,0.08);
            border:1px solid rgba(0,229,255,0.25);
            color:var(--accent);
        }
        .doc-request-btn {
            display:inline-block;
            margin-top:10px;
            padding:8px 20px;
            border:1px solid var(--accent);
            color:var(--accent);
            text-decoration:none;
            border-radius:30px;
            font-size:12px;
        }

        footer {
            padding:40px;
            text-align:center;
            font-size:12px;
            color:rgba(255,255,255,0.3);
        }

        /* ================= LANGUAGE ================= */
        .en, .lang-en .ru { display:none; }
        .lang-en .en { display:block; }
        body:not(.lang-en) .en { display:none; }
        body:not(.lang-en) .ru { display:block; }

        /* ================= CHAT OVERLAY ================= */
        #chatOverlay {
            position:fixed;
            inset:0;
            background:rgba(0,4,14,0.97);
            z-index:999;
            display:none;
            flex-direction:column;
        }
        #chatOverlay.active { display:flex; }

        .chat-header {
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px;
            border-bottom:1px solid rgba(0,229,255,0.2);
        }

        .chat-messages {
            flex:1;
            overflow-y:auto;
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .msg-row { display:flex; gap:10px; }
        .msg-row.user { flex-direction:row-reverse; }

        .msg-bubble {
            padding:12px 16px;
            border-radius:16px;
            max-width:70%;
