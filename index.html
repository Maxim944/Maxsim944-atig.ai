<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #eef5ff;
    overflow: hidden;

    /* Глубокий космос без звёзд */
    background: radial-gradient(circle at 30% 30%, #0b1a3a 0%, #05070f 40%, #00020b 100%);
}

/* Мягкое космическое свечение */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 70% 20%, rgba(43,108,255,0.15), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(125,221,255,0.08), transparent 50%);
    pointer-events: none;
}

#chat {
    height: calc(100vh - 70px);
    overflow-y: auto;
    padding: 20px;
    box-sizing: border-box;
}

/* Сообщения */
.msg {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 16px;
    max-width: 80%;
    backdrop-filter: blur(6px);
    line-height: 1.4;
    animation: fadeIn 0.3s ease;
}

/* Сообщение пользователя */
.user {
    background: rgba(43, 108, 255, 0.25);
    align-self: flex-end;
    margin-left: auto;
}

/* Сообщение АТИГ */
.atig {
    background: rgba(22, 32, 51, 0.7);
    border: 1px solid rgba(125, 221, 255, 0.15);
}

/* Блок ввода */
#inputBox {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 10px;
    box-sizing: border-box;
    background: rgba(5, 7, 15, 0.8);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(125, 221, 255, 0.1);
}

/* Поле ввода */
input {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.05);
    color: #eef5ff;
    outline: none;
    font-size: 14px;
}

/* Кнопка */
button {
    margin-left: 10px;
    padding: 14px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #2b6cff, #7ddcff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
}

button:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(43, 108, 255, 0.4);
}

/* Анимация появления сообщений */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
