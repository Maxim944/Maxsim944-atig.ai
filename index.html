<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atig Systems</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #030712;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(40px);
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .logo-container {
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
            width: 80px;
            height: 80px;
        }

        .core {
            width: 20px;
            height: 20px;
            background-color: #f59e0b;
            border-radius: 50%;
            box-shadow: 0 0 20px #f59e0b;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(56, 189, 248, 0.4);
            border-radius: 50%;
        }

        .orbit-1 { width: 70px; height: 30px; transform: translate(-50%, -50%) rotate(30deg); animation: rotate1 10s linear infinite; }
        .orbit-2 { width: 70px; height: 30px; transform: translate(-50%, -50%) rotate(-30deg); animation: rotate2 10s linear infinite; }

        h1 {
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 0.4rem;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .brand {
            color: #38bdf8;
            font-weight: 600;
        }

        .sub-brand {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.25rem;
            color: #6b7280;
            margin-bottom: 30px;
            font-weight: 400;
        }

        p {
            font-size: 0.95rem;
            color: #9ca3af;
            letter-spacing: 0.05rem;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.6;
        }

        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 4px 12px;
            border-radius: 4px;
        }

        .btn-connect {
            display: inline-block;
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.15rem;
            color: #ffffff;
            padding: 16px 35px;
            border: 1px solid #38bdf8;
            border-radius: 4px;
            background: rgba(7, 11, 25, 0.6);
            transition: all 0.3s ease;
            position: relative;
            z-index: 20;
        }

        .btn-connect:hover {
            background: #38bdf8;
            color: #030712;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
        }

        @keyframes rotate1 {
            0% { transform: translate(-50%, -50%) rotate(30deg); }
            100% { transform: translate(-50%, -50%) rotate(390deg); }
        }

        @keyframes rotate2 {
            0% { transform: translate(-50%, -50%) rotate(-30deg); }
            100% { transform: translate(-50%, -50%) rotate(330deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="core"></div>
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>
        </div>

        <h1><span class="brand">Atig</span> Systems</h1>
        <div class="sub-brand">Advanced Technologies Initiated by Genius</div>
        
        <p>Проектирование, монтаж и комплексный мониторинг интеллектуальных систем охранно-пожарной сигнализации и автоматики в Алматы.</p>

        <div class="tags">
            <div class="tag">Интеграция</div>
            <div class="tag">Безопасность</div>
            <div class="tag">Контроль</div>
        </div>

        <a href="tel:+77072562388" class="btn-connect">Установить связь</a>
    </div>

</body>
</html>
