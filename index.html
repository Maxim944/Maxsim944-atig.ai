<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATIG MVP</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #eef5ff;
    background: radial-gradient(circle at center, #0b1a3a 0%, #05070f 50%, #00020b 100%);
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    text-align: center;
    padding: 15px;
    font-size: 20px;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3);
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 16px;
    max-width: 80%;
    line-height: 1.4;
    word-wrap: break-word;
}

.user {
    background: #2b6cff;
    margin-left: auto;
}

.atig {
    background: #162033;
    border: 1px solid rgba(125,221,255,0.2);
}

#inputBox {
    display: flex;
    padding: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
}

#input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #0f1629;
    color: #fff;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #2b6cff;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #4a82ff;
}
</style>
</head>

<body>

<header>ATIG</header>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Спросите АТИГ..." />
    <button onclick="send()">Отправить</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

// ✅ АВТОМАТИЧЕСКИЙ АДРЕС: Берет адрес текущего сайта
const API_URL = window.location.origin + "/chat";

function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

window.onload = () => {
    addMsg(
        "Здравствуйте! Я АТИГ — ваш персональный интеллектуальный помощник. Чем могу помочь?",
        "atig"
    );
};

async function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: text
            })
        });

        const data = await res.json();
        
        if (!res.ok) {
            throw new Error(data.reply || "Ошибка сервера");
        }

        const reply = data.reply || "Нет ответа от сервера.";
        addMsg(reply, "atig");

    } catch (error) {
        console.error("Ошибка:", error);
        addMsg(
            "Извините, произошла ошибка: " + error.message,
            "atig"
        );
    }
}

input.addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        send();
    }
});
</script>

</body>
</html>
