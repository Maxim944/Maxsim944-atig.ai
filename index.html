<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>ATIG MVP</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f1a;
    color: #fff;
}

#chat {
    height: 90vh;
    overflow-y: auto;
    padding: 20px;
}

.msg {
    margin: 10px 0;
    padding: 10px;
    border-radius: 10px;
}

.user { background: #1f2a44; }
.atig { background: #162033; }

#inputBox {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
}

input {
    flex: 1;
    padding: 15px;
    border: none;
}

button {
    padding: 15px;
    border: none;
    background: #2b6cff;
    color: white;
}
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
    <input id="input" placeholder="Спросите АТИГ..." />
    <button onclick="send()">→</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    // ATIG CORE prompt
    const system = "Ты АТИГ. Отвечай кратко, понятно, структурно.";

    try {
        const res = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer YOUR_API_KEY"
            },
            body: JSON.stringify({
                model: "gpt-4o-mini",
                messages: [
                    { role: "system", content: system },
                    { role: "user", content: text }
                ]
            })
        });

        const data = await res.json();
        const reply = data.choices[0].message.content;

        addMsg(reply, "atig");

    } catch (e) {
        addMsg("Ошибка соединения с АТИГ", "atig");
    }
}
</script>

</body>
</html>
