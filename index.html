<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КАРТА ВСЕЛЕННОЙ ATIG | Архитектура ИИ Нового Поколения</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: radial-gradient(circle at center, #0a0a2a 0%, #000011 80%);
      color: #a0e7ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(103, 232, 249, 0.25);
    }
    .neon-core {
      animation: corePulse 6s ease-in-out infinite;
    }
    @keyframes corePulse {
      0%, 100% { box-shadow: 0 0 70px #67e8f9, 0 0 110px #22d3ee; }
      50% { box-shadow: 0 0 100px #67e8f9, 0 0 150px #22d3ee; }
    }
    .section {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .section:hover {
      transform: translateY(-8px);
      border-color: rgb(103 232 249);
    }
  </style>
</head>
<body class="min-h-screen py-10 relative">

  <!-- Background effects -->
  <div class="absolute inset-0 bg-[radial-gradient(#ffffff15_1px,transparent_1px)] [background-size:80px_80px] pointer-events-none"></div>

  <div class="max-w-7xl mx-auto px-6 relative z-10">
    <h1 class="text-5xl md:text-6xl font-bold text-center mb-3 tracking-wider">КАРТА ВСЕЛЕННОЙ ATIG</h1>
    <p class="text-center text-cyan-300 text-xl mb-16">Архитектура персонального ИИ нового поколения</p>

    <!-- Центральное ядро -->
    <div class="flex justify-center mb-20 relative">
      <div onclick="showDetail('core')" 
           class="neon-core w-96 h-96 rounded-full border-8 border-cyan-400 bg-gradient-to-br from-purple-950 via-blue-950 to-indigo-950 flex items-center justify-center cursor-pointer hover:scale-105 transition-all">
        <div class="text-center">
          <div class="text-7xl font-black tracking-widest">ATIG</div>
          <div class="text-4xl">CORE (IG-01)</div>
          <div class="text-cyan-300 mt-6">Ядро интеллекта</div>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-12 gap-8">
      
      <!-- Foundation Layer -->
      <div class="lg:col-span-3 section glass rounded-3xl p-7 cursor-pointer" onclick="showDetail('foundation')">
        <h2 class="text-2xl font-bold text-cyan-400 mb-5">
