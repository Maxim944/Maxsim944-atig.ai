<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATIG — AI для юристов</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
}

.container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
}

h1 {
    font-size: 32px;
}

.subtitle {
    color: #9aa4c7;
    margin-bottom: 30px;
}

.card {
    background: #141a2e;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.chat {
    height: 300px;
    overflow-y: auto;
    background: #0f1424;
    border-radius: 10px;
    padding: 10px;
}

.message {
    margin: 8px 0;
}

.user {
    color: #7aa2ff;
}

.bot {
    color: #b4ffb4;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
}

#buttons {
    margin-top: 10px;
}

.btn {
    display: inline-block;
    padding: 8px 14px;
    background: #2a335a;
    border-radius: 8px;
    margin: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>AI-ассистент для юристов</h1>
<div class="subtitle">
Отвечает клиентам, собирает заявки и увеличивает конверсию
</div>

<div class="card">
<b>Попробуйте демо:</b>

<div class="chat" id="chat">
<div class="message bot">Здравствуйте. Опишите вашу ситуацию.</div>
</div>

<input id="input" placeholder="Напишите вопрос..." onkeypress="handleKey(event)">
<div id="buttons"></div>

</div>

</div>

<script>

let lead = {
    name: null,
    contact: null,
    issue: null,
    step: 0
};

function addMessage(text, type) {
    let chat = document.getElementById("chat");
    let msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function showButtons(options) {
    let container = document.getElementById("buttons");
    container.innerHTML = "";

    options.forEach(opt => {
        let btn = document.createElement("div");
        btn.className = "btn";
        btn.innerText = opt;
        btn.onclick = () => {
            addMessage(opt, "user");
            container.innerHTML = "";
            setTimeout(() => botFlow(opt), 400);
        };
        container.appendChild(btn);
    });
}

function handleKey(e) {
    if (e.key === "Enter") sendMessage();
}

function sendMessage() {
    let input = document.getElementById("input");
    let text = input.value;
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
        botFlow(text);
    }, 500);
}

function botFlow(text) {
    text = text.toLowerCase();

    // STEP 1
    if (lead.step === 0) {
        if (
            text.includes("увол") ||
            text.includes("долг") ||
            text.includes("развод") ||
            text.includes("дтп")
        ) {
            lead.issue = text;
            lead.step = 1;

            addMessage("Понял ситуацию. Как к вам можно обращаться?", "bot");
        } else {
            addMessage("Опишите ситуацию (увольнение, долг, развод, ДТП)", "bot");
        }
        return;
    }

    // STEP 2
    if (lead.step === 1) {
        lead.name = text;
        lead.step = 2;

        addMessage("Спасибо. Как с вами можно связаться?", "bot");
        return;
    }

    // STEP 3
    if (lead.step === 2) {
        lead.contact = text;
        lead.step = 3;

        addMessage(
`${lead.name}, я зафиксировал вашу ситуацию.

📌 В подобных случаях:
— часто можно решить вопрос  
— важно не затягивать  

Обычно консультация стоит 10–20 тыс ₸,  
но сейчас можно бесплатно.

Передать заявку юристу?`,
"bot"
        );

        showButtons(["Да", "Пока думаю"]);
        return;
    }

    // STEP 4
    if (lead.step === 3) {

        if (text.includes("да")) {

            lead.step = 4;

            let message =
`Новая заявка ATIG:
Имя: ${lead.name}
Ситуация: ${lead.issue}
Контакт: ${lead.contact}`;

            let phone = "7072562388"; // ← ВСТАВЬ СВОЙ НОМЕР

            let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

            addMessage("Отлично. Передаю заявку...", "bot");

            setTimeout(() => {
                window.open(url, "_blank");
            }, 800);

            setTimeout(() => {
                addMessage("✅ Заявка отправлена. Ожидайте связи.", "bot");
            }, 1500);

            return;
        }

        addMessage(
"Понимаю. Это бесплатно и ни к чему не обязывает.\n\nПередать заявку?",
"bot"
        );

        showButtons(["Да", "Нет"]);
        return;
    }
}

</script>

</body>
</html>
