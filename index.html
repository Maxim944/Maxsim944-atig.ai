<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>IG Sphere v2 | ATIG.AI - Кинематографическая сфера</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Rajdhani', 'Orbitron', 'Courier New', monospace;
            background-color: black;
        }
        /* Информационная панель в стиле изображения */
        .info-panel {
            position: absolute;
            bottom: 24px;
            left: 24px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 10px 20px;
            border-left: 3px solid #00f2ff;
            font-family: monospace;
            letter-spacing: 1px;
            pointer-events: none;
            color: #ccf4ff;
            font-size: 13px;
            box-shadow: 0 0 15px rgba(0, 180, 230, 0.2);
        }
        .info-panel .brand {
            font-weight: bold;
            font-size: 16px;
            color: #7df9ff;
            letter-spacing: 2px;
        }
        .info-panel .version {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }
        /* Блок управления */
        .controls {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            gap: 12px;
            z-index: 20;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 45px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            pointer-events: auto;
        }
        button {
            background: rgba(10, 20, 35, 0.8);
            border: 1px solid #0cf;
            color: #0cf;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            letter-spacing: 1px;
        }
        button:hover {
            background: #0cf;
            color: #000;
            box-shadow: 0 0 15px #0cf;
            text-shadow: none;
            border-color: #fff;
        }
        .title-center {
            position: absolute;
            top: 24px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
            font-family: 'Orbitron', monospace;
            font-weight: 300;
            font-size: 12px;
            letter-spacing: 4px;
            color: rgba(0, 242, 255, 0.7);
            text-transform: uppercase;
            background: rgba(0,0,0,0.3);
            width: fit-content;
            margin: 0 auto;
            padding: 6px 18px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            pointer-events: none;
        }
        .live-badge {
            position: absolute;
            top: 24px;
            right: 24px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-family: monospace;
            color: #0f0;
            border-right: 2px solid #0f0;
            letter-spacing: 1px;
            z-index: 20;
            pointer-events: none;
        }
        @media (max-width: 700px) {
            button { padding: 5px 12px; font-size: 11px; }
            .controls { padding: 8px 14px; gap: 8px; }
            .info-panel { padding: 6px 14px; font-size: 10px; bottom: 16px; left: 16px; }
            .title-center { font-size: 8px; top: 16px; }
        }
    </style>
</head>
<body>
    <div class="title-center">IG-01 • КИНЕМАТОГРАФИЧЕСКАЯ СФЕРА v2</div>
    <div class="live-badge">⚡ ACTIVE • CORE PULSE</div>
    <div class="info-panel">
        <div class="brand">ATIG.AI</div>
        <div>IG SPHERE v2.1 | INTELLIGENT GENESIS</div>
        <div class="version">STATUS: ACTIVE | MODE: CINEMATIC</div>
    </div>
    <div class="controls">
        <button id="pulseBtn">⚡ ПУЛЬС</button>
        <button id="speedUpBtn">🌀 СКОРОСТЬ +</button>
        <button id="speedDownBtn">🌀 СКОРОСТЬ -</button>
    </div>

    <!-- Импорт Three.js и расширений -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { FilmPass } from 'three/addons/postprocessing/FilmPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { RGBShiftShader } from 'three/addons/shaders/RGBShiftShader.js';

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010106);
        scene.fog = new THREE.FogExp2(0x010106, 0.012);

        // Камера с кинематографичным FOV
        const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0.2, 5.2);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.body.appendChild(renderer.domElement);

        // --- ПОСТОБРАБОТКА (киношный блум + легкий RGB сдвиг + зерно)
        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.3, 0.5, 0.2);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 1.25;
        bloomPass.radius = 0.8;
        
        // RGB шифт для кибер-атмосферы
        const rgbShiftPass = new ShaderPass(RGBShiftShader);
        rgbShiftPass.uniforms['amount'].value = 0.0025;
        
        // Лёгкая плёночная зернистость
        const filmPass = new FilmPass(0.25, 0.5, 2048, false);
        filmPass.renderToScreen = false;
        
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderPass);
        effectComposer.addPass(bloomPass);
        effectComposer.addPass(rgbShiftPass);
        effectComposer.addPass(filmPass);
        filmPass.renderToScreen = true;
        
        // --- ОСВЕЩЕНИЕ (динамическое, объёмное)
        const ambientLight = new THREE.AmbientLight(0x0a0a1a);
        scene.add(ambientLight);
        
        const keyLight = new THREE.DirectionalLight(0x88aaff, 1.2);
        keyLight.position.set(2, 3, 4);
        scene.add(keyLight);
        
        const fillLight = new THREE.PointLight(0x3366cc, 0.6);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0x00aaff, 0.9);
        rimLight.position.set(1, 2, -3);
        scene.add(rimLight);
        
        // Подсветка снизу для эффекта парения
        const bottomLight = new THREE.PointLight(0x2266aa, 0.7);
        bottomLight.position.set(0, -1.5, 0);
        scene.add(bottomLight);
        
        // Центральный источник пульса
        const coreGlow = new THREE.PointLight(0x00ccff, 1.5, 12);
        coreGlow.position.set(0, 0, 0);
        scene.add(coreGlow);
        
        // --- СОЗДАНИЕ ГЛАВНОЙ СФЕРЫ (технологичная, с текстурой-сеткой)
        const geometry = new THREE.SphereGeometry(1.48, 180, 180);
        
        // Кастомная текстура: хексагонально-цифровая сетка, сияющие контуры
        const canvasTex = document.createElement('canvas');
        canvasTex.width = 1024;
        canvasTex.height = 1024;
        const ctx = canvasTex.getContext('2d');
        ctx.fillStyle = '#03061a';
        ctx.fillRect(0, 0, canvasTex.width, canvasTex.height);
        
        // Рисуем футуристическую сетку как на обложке
        ctx.strokeStyle = '#2affdd';
        ctx.lineWidth = 3;
        const step = canvasTex.width / 32;
        for (let i = 0; i <= 32; i++) {
            ctx.beginPath();
            ctx.moveTo(i * step, 0);
            ctx.lineTo(i * step, canvasTex.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * step);
            ctx.lineTo(canvasTex.width, i * step);
            ctx.stroke();
        }
        // Добавляем диагональные линии
        ctx.strokeStyle = '#00ccff66';
        ctx.lineWidth = 2;
        for (let d = -canvasTex.width; d < canvasTex.width; d += 40) {
            ctx.beginPath();
            ctx.moveTo(d, 0);
            ctx.lineTo(d + canvasTex.width, canvasTex.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, d);
            ctx.lineTo(canvasTex.width, d + canvasTex.height);
            ctx.stroke();
        }
        // Акцентные точки
        ctx.fillStyle = '#77ffff';
        for (let i = 0; i < 800; i++) {
            const x = Math.random() * canvasTex.width;
            const y = Math.random() * canvasTex.height;
            ctx.fillRect(x, y, 2, 2);
        }
        // Центрические круги (аура)
        ctx.strokeStyle = '#0cf';
        ctx.lineWidth = 4;
        for (let r = 0.2; r <= 0.9; r += 0.15) {
            ctx.beginPath();
            ctx.arc(canvasTex.width/2, canvasTex.height/2, canvasTex.width/2 * r, 0, Math.PI*2);
            ctx.stroke();
        }
        const techTexture = new THREE.CanvasTexture(canvasTex);
        techTexture.wrapS = THREE.RepeatWrapping;
        techTexture.wrapT = THREE.RepeatWrapping;
        
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0x0b1428,
            emissive: 0x2266aa,
            emissiveIntensity: 1.2,
            metalness: 0.75,
            roughness: 0.3,
            map: techTexture,
            emissiveMap: techTexture
        });
        
        const sphere = new THREE.Mesh(geometry, sphereMat);
        scene.add(sphere);
        
        // Внутренняя полусфера для глубины свечения
        const innerGlowMat = new THREE.MeshBasicMaterial({
            color: 0x2288ff,
            transparent: true,
            opacity: 0.13,
            side: THREE.BackSide
        });
        const innerSphere = new THREE.Mesh(new THREE.SphereGeometry(1.32, 96, 96), innerGlowMat);
        scene.add(innerSphere);
        
        // --- ПАРЯЩИЕ КОЛЬЦА (техно-конструкция)
        const ringGeo = new THREE.TorusGeometry(1.68, 0.045, 128, 400);
        const ringMatMain = new THREE.MeshStandardMaterial({ color: 0x33ddff, emissive: 0x2288aa, emissiveIntensity: 1.1 });
        const mainRing = new THREE.Mesh(ringGeo, ringMatMain);
        mainRing.rotation.x = Math.PI / 2;
        scene.add(mainRing);
        
        const ringGeo2 = new THREE.TorusGeometry(1.85, 0.028, 128, 400);
        const ringMat2 = new THREE.MeshStandardMaterial({ color: 0x77ffff, emissive: 0x00aacc, emissiveIntensity: 0.9 });
        const tiltRing = new THREE.Mesh(ringGeo2, ringMat2);
        tiltRing.rotation.x = 0.8;
        tiltRing.rotation.z = 0.4;
        scene.add(tiltRing);
        
        const ringGeo3 = new THREE.TorusGeometry(1.52, 0.02, 128, 400);
        const ringMat3 = new THREE.MeshStandardMaterial({ color: 0xaaffff, emissive: 0x33ccff });
        const innerRing = new THREE.Mesh(ringGeo3, ringMat3);
        innerRing.rotation.x = Math.PI / 2 + 0.2;
        scene.add(innerRing);
        
        // --- ЗВЁЗДНОЕ ПОЛЕ С ГЛУБИНОЙ (тысячи частиц)
        const starCount = 4500;
        const starGeo = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            // Сферическое распределение + небольшой размер
            const rad = 6 + Math.random() * 18;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositions[i*3] = rad * Math.sin(phi) * Math.cos(theta);
            starPositions[i*3+1] = rad * Math.sin(phi) * Math.sin(theta) * 0.6;
            starPositions[i*3+2] = rad * Math.cos(phi);
            
            const intensity = 0.4 + Math.random() * 0.8;
            starColors[i*3] = 0.6 + Math.random() * 0.4;
            starColors[i*3+1] = 0.7 + Math.random() * 0.3;
            starColors[i*3+2] = 1.0;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        const starMat = new THREE.PointsMaterial({ size: 0.045, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // Мелкие далёкие звёзды (туманность)
        const dustCount = 2800;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = [];
        for (let i = 0; i < dustCount; i++) {
            dustPos.push((Math.random() - 0.5) * 90);
            dustPos.push((Math.random() - 0.5) * 60);
            dustPos.push((Math.random() - 0.5) * 50 - 15);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dustPos), 3));
        const dustMat = new THREE.PointsMaterial({ color: 0x88bbff, size: 0.025, transparent: true, opacity: 0.4 });
        const dustField = new THREE.Points(dustGeo, dustMat);
        scene.add(dustField);
        
        // --- ЭФФЕКТ МЕРЦАЮЩИХ ОРЕОЛОВ (доп. частицы вокруг сферы)
        const auraCount = 1200;
        const auraGeo = new THREE.BufferGeometry();
        const auraPositions = [];
        for (let i = 0; i < auraCount; i++) {
            const r = 1.65 + Math.random() * 0.35;
            const theta2 = Math.random() * Math.PI * 2;
            const phi2 = Math.acos(2 * Math.random() - 1);
            auraPositions.push(r * Math.sin(phi2) * Math.cos(theta2));
            auraPositions.push(r * Math.sin(phi2) * Math.sin(theta2));
            auraPositions.push(r * Math.cos(phi2));
        }
        auraGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(auraPositions), 3));
        const auraMat = new THREE.PointsMaterial({ color: 0x33ddff, size: 0.008, transparent: true, blending: THREE.AdditiveBlending });
        const auraParticles = new THREE.Points(auraGeo, auraMat);
        scene.add(auraParticles);
        
        // Динамический луч (линза эффект)
        const lensGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.55, 32, 32),
            new THREE.MeshBasicMaterial({ color: 0x2266aa, transparent: true, opacity: 0.05, side: THREE.BackSide })
        );
        scene.add(lensGlow);
        
        // --- ПЕРЕМЕННЫЕ АНИМАЦИИ ---
        let rotationSpeed = 0.0026;
        let time = 0;
        let pulseIntensity = 0;
        let isPulsing = false;
        
        // --- ИНТЕРАКТИВНЫЕ КНОПКИ (полное соответствие UI с картинки)
        document.getElementById('pulseBtn').addEventListener('click', () => {
            isPulsing = true;
            pulseIntensity = 1.0;
            // Визуальный отклик
            sphereMat.emissiveIntensity = 2.9;
            coreGlow.intensity = 3.2;
            innerGlowMat.opacity = 0.45;
            // Эффект на кольцах
            ringMatMain.emissiveIntensity = 2.5;
            ringMat2.emissiveIntensity = 2.3;
            
            // Вибрирующая вспышка камеры
            camera.position.z = 5.05;
            setTimeout(() => {
                camera.position.z = 5.2;
            }, 120);
            
            setTimeout(() => {
                sphereMat.emissiveIntensity = 1.2;
                coreGlow.intensity = 1.5;
                innerGlowMat.opacity = 0.13;
                ringMatMain.emissiveIntensity = 1.1;
                ringMat2.emissiveIntensity = 0.9;
                isPulsing = false;
            }, 360);
        });
        
        document.getElementById('speedUpBtn').addEventListener('click', () => {
            rotationSpeed = Math.min(0.009, rotationSpeed + 0.0009);
        });
        document.getElementById('speedDownBtn').addEventListener('click', () => {
            rotationSpeed = Math.max(0.0009, rotationSpeed - 0.0009);
        });
        
        // --- КИНЕМАТОГРАФИЧЕСКОЕ ДВИЖЕНИЕ КАМЕРЫ (лёгкий шифт и наклоны)
        let cameraAngle = 0;
        
        // --- АНИМАЦИОННЫЙ ЦИКЛ ---
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = 1/60;
            time += deltaTime;
            
            // Вращение сферы и колец
            sphere.rotation.y += rotationSpeed;
            sphere.rotation.x += rotationSpeed * 0.18;
            innerSphere.rotation.copy(sphere.rotation);
            
            mainRing.rotation.z += 0.003;
            mainRing.rotation.y += 0.002;
            tiltRing.rotation.x += 0.004;
            tiltRing.rotation.z += 0.002;
            innerRing.rotation.y += 0.005;
            
            auraParticles.rotation.y -= 0.001;
            stars.rotation.y += 0.0002;
            dustField.rotation.x += 0.0001;
            
            // Пульсирующий эффект если не активен пульс - легкое дыхание
            if (!isPulsing) {
                const breath = 0.9 + Math.sin(time * 1.9) * 0.08;
                sphereMat.emissiveIntensity = 1.1 + Math.sin(time * 2.2) * 0.15;
                coreGlow.intensity = 1.4 + Math.sin(time * 2.5) * 0.25;
                lensGlow.material.opacity = 0.045 + Math.sin(time * 1.4) * 0.02;
            } else {
                // затухание после пульса
                sphereMat.emissiveIntensity -= 0.08;
                if(sphereMat.emissiveIntensity < 1.2) sphereMat.emissiveIntensity = 1.2;
                coreGlow.intensity -= 0.08;
            }
            
            // Анимация бликов RGB shift плавная
            const shiftAmount = 0.002 + Math.sin(time * 0.67) * 0.0015;
            rgbShiftPass.uniforms['amount'].value = shiftAmount;
            
            // Динамическая смена цвета подсветки для атмосферы
            const hue = 0.55 + Math.sin(time * 0.2) * 0.05;
            rimLight.intensity = 0.8 + Math.sin(time * 1.2) * 0.2;
            bottomLight.intensity = 0.6 + Math.sin(time * 1.1) * 0.2;
            
            // Кинематографическое покачивание камеры (параллакс)
            cameraAngle += 0.002;
            const targetX = Math.sin(cameraAngle * 0.35) * 0.08;
            const targetY = Math.cos(cameraAngle * 0.28) * 0.05;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (targetY - camera.position.y) * 0.05;
            camera.lookAt(0, Math.sin(time * 0.4) * 0.05, 0);
            
            // Лёгкое изменение масштаба сферы (пульсация)
            const scaleVal = 1 + Math.sin(time * 3.2) * 0.008;
            sphere.scale.setScalar(scaleVal);
            innerSphere.scale.setScalar(scaleVal);
            
            effectComposer.render();
        }
        
        animate();
        
        // Адаптация размера окна
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
