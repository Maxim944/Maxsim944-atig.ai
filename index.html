<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIG — AI Юрист</title>
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #141a2e;
            --accent: #7aa2ff;
            --bot-msg: #1f2945;
            --user-msg: #2a335a;
            --text-main: #ffffff;
            --text-dim: #9aa4c7;
            --success: #b4ffb4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #7aa2ff, #b4ffb4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .chat {
            height: 350px;
            overflow-y: auto;
            background: #0f1424;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .message {
            margin: 12px 0;
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 85%;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .bot {
            background: var(--bot-msg);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user {
            background: var(--user-msg);
            color: var(--accent);
            margin-left: auto;
            border-bottom-right-radius: 2px;
            text-align: right;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            background: #0f1424;
            border: 1px solid #2a335a;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        #buttons {
            margin-top: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn {
            padding: 10px 18px;
            background: var(--user-msg);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            border: 1px solid transparent;
            color: var(--accent);
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            transform: translateY(-2px);
        }

        .typing { font-style: italic; color: var(--text-dim); font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>ATIG Legal AI</h1>
    <div class="subtitle">Ваш персональный юридический ассистент 24/7</div>

    <div class="card">
        <div class="chat" id="chat">
            <div class="message bot">Здравствуйте! Я AI-ассистент. Опишите вашу ситуацию или выберите категорию ниже.</div>
        </div>
        <div id="typing" class="typing">Юрист печатает...</div>
        
        <div class="input-group">
            <input id="input" placeholder="Введите ваш вопрос..." onkeypress="handleKey(event)">
        </div>

        <div id="buttons">
            <div class="btn" onclick="quickSelect('Развод / Алименты')">Развод</div>
            <div class="btn" onclick="quickSelect('Долги / Банкротство')">Долги</div>
            <div class="btn" onclick="quickSelect('ДТП / Страховка')">ДТП</div>
            <div class="btn" onclick="quickSelect('Трудовой спор')">Работа</div>
        </div>
    </div>
</div>

<script>
    let lead = { name: null, contact: null, issue: null, step: 0 };

    function addMessage(text, type) {
        let chat = document.getElementById("chat");
        let msg = document.createElement("div");
        msg.className = "message " + type;
        msg.innerText = text;
        chat.appendChild(msg);
        chat.scrollTop = chat.scrollHeight;
    }

    function handleKey(e) { if (e.key === "Enter") sendMessage(); }

    function quickSelect(text) {
        addMessage(text, "user");
        setTimeout(() => botFlow(text), 600);
    }

    function sendMessage() {
        let input = document.getElementById("input");
        let text = input.value.trim();
        if (!text) return;
        addMessage(text, "user");
        input.value = "";
        document.getElementById("typing").style.display = "block";
        setTimeout(() => {
            document.getElementById("typing").style.display = "none";
            botFlow(text);
        }, 800);
    }

    function botFlow(text) {
        let rawText = text.toLowerCase();

        // ШАГ 0: Определение проблемы
        if (lead.step === 0) {
            lead.issue = text;
            lead.step = 1;
            addMessage("Понял вас. Ситуация требует внимания. Как я могу к вам обращаться?", "bot");
            document.getElementById("buttons").innerHTML = ""; 
            return;
        }

        // ШАГ 1: Имя
        if (lead.step === 1) {
            lead.name = text;
            lead.step = 2;
            addMessage(`Приятно познакомиться, ${text}. Укажите ваш номер телефона или WhatsApp для связи с юристом.`, "bot");
            return;
        }

        // ШАГ 2: Контакты и оффер
        if (lead.step === 2) {
            lead.contact = text;
            lead.step = 3;
            addMessage(
                `${lead.name}, спасибо! Я проанализировал запрос. \n\n✅ У нас есть опыт в таких делах. Сейчас мы проводим бесплатные консультации для новых клиентов (вместо 15 000 ₸). \n\nПередать вашу заявку профильному юристу?`, 
                "bot"
            );
            showFinalButtons();
            return;
        }

        // ШАГ 3: Финал
        if (lead.step === 3) {
            if (rawText.includes("да") || rawText.includes("передавай")) {
                sendToWhatsapp();
            } else {
                addMessage("Консультация вас ни к чему не обязывает, но поможет понять ваши права. Передать данные?", "bot");
                showFinalButtons();
            }
        }
    }

    function showFinalButtons() {
        let container = document.getElementById("buttons");
        container.innerHTML = `
            <div class="btn" onclick="quickSelect('Да, передавайте')">Да, жду звонка</div>
            <div class="btn" onclick="quickSelect('Я еще подумаю')">Пока думаю</div>
        `;
    }

    function sendToWhatsapp() {
        let message = `Новая заявка ATIG Юрист:\n👤 Имя: ${lead.name}\n💬 Ситуация: ${lead.issue}\n📞 Контакт: ${lead.contact}`;
        let phone = "7072562388"; 
        let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        
        addMessage("Секунду, формирую заявку для юриста...", "bot");
        setTimeout(() => {
            window.open(url, "_blank");
            addMessage("✅ Готово! Юрист свяжется с вами в ближайшее время.", "bot");
        }, 1200);
    }
</script>

</body>
</html>
