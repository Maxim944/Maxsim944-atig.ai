<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IG Sphere v2</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
        color: white;
    }
    canvas { display: block; }#ui {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
}

.btn {
    padding: 10px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    cursor: pointer;
}

#title {
    position: absolute;
    top: 20px;
    left: 20px;
    opacity: 0.6;
    font-size: 12px;
    letter-spacing: 3px;
}

</style>
</head>
<body><div id="title">IG-01 • CINEMATIC SPHERE v2</div>
<div id="ui">
    <div class="btn" id="pulseBtn">Pulse</div>
    <div class="btn" id="speedUp">Speed +</div>
    <div class="btn" id="speedDown">Speed -</div>
</div><script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';
import { EffectComposer } from 'https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/postprocessing/EffectComposer.js';
import { RenderPass } from 'https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/postprocessing/UnrealBloomPass.js';

let scene, camera, renderer, composer;
let sphere, particles;
let rotateSpeed = 0.002;
let clock = new THREE.Clock();

init();
animate();

function init() {
    scene = new THREE.Scene();

    // COSMIC FOG (depth)
    scene.fog = new THREE.FogExp2(0x000000, 0.035);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.z = 6;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // LIGHT
    const light = new THREE.PointLight(0x66ccff, 2);
    light.position.set(5, 5, 5);
    scene.add(light);

    scene.add(new THREE.AmbientLight(0x111122));

    // CORE SPHERE
    const geometry = new THREE.SphereGeometry(1.5, 128, 128);
    const material = new THREE.MeshStandardMaterial({
        color: 0x0b1020,
        emissive: 0x00aaff,
        emissiveIntensity: 1.2,
        metalness: 0.3,
        roughness: 0.25
    });

    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // PARTICLES (space)
    const pGeometry = new THREE.BufferGeometry();
    const count = 3000;
    const pos = [];

    for (let i = 0; i < count; i++) {
        pos.push((Math.random() - 0.5) * 60);
        pos.push((Math.random() - 0.5) * 60);
        pos.push((Math.random() - 0.5) * 60);
    }

    pGeometry.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));

    const pMaterial = new THREE.PointsMaterial({
        color: 0x88ccff,
        size: 0.04,
        transparent: true,
        opacity: 0.7
    });

    particles = new THREE.Points(pGeometry, pMaterial);
    scene.add(particles);

    // BLOOM (cinematic glow)
    composer = new EffectComposer(renderer);

    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.4, // strength
        0.6, // radius
        0.2  // threshold
    );

    composer.addPass(bloomPass);

    // UI
    document.getElementById('pulseBtn').onclick = pulse;
    document.getElementById('speedUp').onclick = () => rotateSpeed += 0.001;
    document.getElementById('speedDown').onclick = () => rotateSpeed = Math.max(0.0005, rotateSpeed - 0.001);

    window.addEventListener('resize', onResize);
}

function animate() {
    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    sphere.rotation.y += rotateSpeed;
    sphere.rotation.x += rotateSpeed * 0.3;

    sphere.scale.setScalar(1 + Math.sin(t * 2) * 0.03);

    particles.rotation.y += 0.0002;

    // subtle camera drift (cinematic feel)
    camera.position.x = Math.sin(t * 0.2) * 0.2;
    camera.position.y = Math.cos(t * 0.15) * 0.15;

    composer.render();
}

function pulse() {
    sphere.material.emissiveIntensity = 2.5;
    setTimeout(() => sphere.material.emissiveIntensity = 1.2, 300);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
}
</script></body>
</html>
