<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ATIG</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F8QHBK1DJT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F8QHBK1DJT');
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }

    #sphere {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #00cfff, #0033ff);
      box-shadow: 0 0 40px #00cfff;
      cursor: pointer;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #text {
      position: absolute;
      top: 20%;
      text-align: center;
      width: 100%;
      font-size: 18px;
      opacity: 0.8;
    }
  </style>
</head>
<body>

<div id="text">Нажми на сферу и скажи "Привет"</div>
<div id="sphere"></div>

<script>
const sphere = document.getElementById("sphere");
const text = document.getElementById("text");

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.lang = 'ru-RU';

function speak(msg) {
  const utterance = new SpeechSynthesisUtterance(msg);
  utterance.lang = 'ru-RU';
  speechSynthesis.speak(utterance);
}

// Клик по сфере
sphere.onclick = () => {
  text.innerText = "Слушаю...";
  recognition.start();

  // аналитика
  gtag('event', 'sphere_click', {
    event_category: 'ATIG',
    event_label: 'Главная сфера'
  });
};

// Когда услышал речь
recognition.onresult = function(event) {
  const userText = event.results[0][0].transcript.toLowerCase();
  text.innerText = "Ты сказал: " + userText;

  // аналитика
  gtag('event', 'voice_input', {
    event_category: 'ATIG',
    event_label: userText
  });

  if (userText.includes("привет")) {
    speak("Привет. Я ATIG. Рад тебя видеть.");
  } else {
    speak("Я тебя услышал. Пока учусь понимать.");
  }
};
</script>

</body>
</html>
