<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ATIG</title>

  <!-- Аналитика -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F8QHBK1DJT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-F8QHBK1DJT');
  </script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }

    /* Звёзды */
    body::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.3;
    }

    /* Сфера */
    #sphere {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #00cfff, #0033ff);
      box-shadow: 0 0 40px #00cfff;
      cursor: pointer;
      animation: pulse 2s infinite;
      z-index: 2;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #text {
      position: absolute;
      top: 20%;
      text-align: center;
      width: 100%;
      z-index: 2;
    }
  </style>
</head>
<body>

<div id="text">Приветствие ATIG</div>
<div id="sphere"></div>

</body>
</html>
