<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIG.AI — Твой персональный интеллект</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#000510; font-family:'Raleway',sans-serif; color:#fff;
            min-height:100vh; overflow-x:hidden;
        }
        .cosmos { position:fixed; inset:0; background:radial-gradient(ellipse 100% 60% at 50% 40%,#0a1a3e 0%,transparent 60%),#000208; z-index:0; }
        .milkyway { position:absolute; inset:0; background:radial-gradient(ellipse 140% 25% at 50% 52%,rgba(120,160,255,0.12) 0%,transparent 70%); transform:rotate(-12deg) scale(1.6); }
        .star { position:absolute; border-radius:50%; background:#fff; animation:tw var(--d) ease-in-out infinite var(--delay); }
        @keyframes tw { 0%,100%{opacity:var(--lo)} 50%{opacity:var(--hi)} }

        nav { position:fixed; top:0; width:100%; padding:18px 5%; display:flex; justify-content:space-between; align-items:center; z-index:100; background:rgba(0,5,16,0.9); backdrop-filter:blur(12px); }
        .nav-logo { font-size:28px; font-weight:600; color:#00e5ff; letter-spacing:8px; text-shadow:0 0 20px #00e5ff; }

        section { position:relative; z-index:10; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:100px 20px; text-align:center; }

        .hero-logo { font-size:88px; font-weight:600; color:#00e5ff; letter-spacing:18px; text-shadow:0 0 60px #00e5ff; margin:20px 0; }
        .talk-btn {
            margin-top:40px; padding:18px 48px; font-size:16px; letter-spacing:4px;
            background:transparent; border:2px solid #00e5ff; color:#00e5ff;
            border-radius:50px; cursor:pointer; transition:all 0.4s;
        }
        .talk-btn:hover { background:#00e5ff; color:#000; box-shadow:0 0 40px #00e5ff; }

        /* Модальное окно чата */
        .modal {
            display:none; position:fixed; inset:0; background:rgba(0,5,20,0.97);
            z-index:200; align-items:center; justify-content:center;
        }
        .chat-window {
            width:95%; max-width:680px; height:85vh; background:#0a1428;
            border:1px solid #00e5ff; border-radius:16px; overflow:hidden; display:flex; flex-direction:column;
        }
        .chat-header {
            padding:16px 20px; background:rgba(0,229,255,0.1); display:flex; justify-content:space-between; align-items:center;
        }
        .model-select {
            padding:8px 14px; background:#112233; color:#fff; border:1px solid #00e5ff; border-radius:8px; font-size:14px;
        }
        .chat-body {
            flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:14px;
            background:linear-gradient(to bottom, #0a1428, #0f1b33);
        }
        .message {
            max-width:85%; padding:14px 18px; border-radius:14px; font-size:15.5px; line-height:1.45;
        }
        .atig { align-self:flex-start; background:rgba(0,229,255,0.15); border:1px solid rgba(0,229,255,0.3); }
        .user { align-self:flex-end; background:#00e5ff; color:#000; }

        .thinking {
            align-self:flex-start; padding:10px 18px; color:#88ccff; font-style:italic;
        }

        .chat-footer {
            padding:12px; background:#0a1428; display:flex; gap:8px;
        }
        .chat-input {
            flex:1; padding:14px 18px; background:#112233; border:none; border-radius:12px; color:#fff; font-size:16px;
        }
        .send-btn {
            padding:0 24px; background:#00e5ff; color:#000; border:none; border-radius:12px; font-weight:600;
        }
    </style>
</head>
<body>

<div class="cosmos"><div class="milkyway"></div><div id="stars"></div></div>

<nav>
    <div class="nav-logo">ATIG</div>
</nav>

<section id="home">
    <div style="font-size:13px; letter-spacing:8px; color:rgba(200,230,255,0.5);">ПРИВЕТСТВИЕ АТИГ</div>
    <div class="hero-logo">ATIG</div>
    <div style="font-size:16px; letter-spacing:5px; color:rgba(125,211,252,0.5);">YOUR COMPANION · FROM BIRTH TO ETERNITY</div>
    
    <button class="talk-btn" onclick="openChat()">ПОГОВОРИТЬ С ATIG</button>
</section>

<!-- Модальное окно чата -->
<div id="chatModal" class="modal">
    <div class="chat-window">
        <div class="chat-header">
            <div><strong>ATIG</strong> — твой личный интеллект</div>
            <select id="modelSelect" class="model-select">
                <option value="multi">🌌 Все ИИ вместе (рекомендуется)</option>
                <option value="claude">Claude 4 Sonnet</option>
                <option value="grok">Grok 4</option>
                <option value="gpt">GPT-4o</option>
                <option value="gemini">Gemini 2.5 Pro</option>
                <option value="llama">Llama 3.3 70B</option>
            </select>
        </div>
        
        <div class="chat-body" id="chatBody">
            <div class="message atig">Привет. Я ATIG — твой личный интеллект.<br>Я могу использовать силу всех ведущих ИИ одновременно.<br>О чём хочешь поговорить?</div>
        </div>

        <div class="chat-footer">
            <input type="text" id="chatInput" class="chat-input" placeholder="Напиши сообщение...">
            <button class="send-btn" onclick="sendMessage()">→</button>
        </div>
    </div>
</div>

<script>
// Создаём звёзды
for(let i = 0; i < 200; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5 + 0.6;
    s.style.cssText = `width:\( {sz}px;height: \){sz}px;left:\( {Math.random()*100}%;top: \){Math.random()*100}%;--d:\( {3+Math.random()*8}s;--delay:- \){Math.random()*6}s;--lo:0.1;--hi:0.6;`;
    document.getElementById('stars').appendChild(s);
}

// Открыть чат
function openChat() {
    document.getElementById('chatModal').style.display = 'flex';
}

// Отправка сообщения
async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const chatBody = document.getElementById('chatBody');
    const model = document.getElementById('modelSelect').value;

    // Добавляем сообщение пользователя
    const userMsg = document.createElement('div');
    userMsg.className = 'message user';
    userMsg.textContent = text;
    chatBody.appendChild(userMsg);

    input.value = '';
    chatBody.scrollTop = chatBody.scrollHeight;

    // Показываем "думает..."
    const thinking = document.createElement('div');
    thinking.className = 'thinking';
    thinking.textContent = 'ATIG думает...';
    chatBody.appendChild(thinking);
    chatBody.scrollTop = chatBody.scrollHeight;

    // Симуляция ответа от разных моделей
    setTimeout(() => {
        chatBody.removeChild(thinking);

        const response = document.createElement('div');
        response.className = 'message atig';

        if (model === 'multi') {
            response.innerHTML = `Я объединил ответы от <strong>Claude</strong>, <strong>Grok</strong>, <strong>GPT-4o</strong> и <strong>Gemini</strong>.<br><br>Твой запрос: «${text}»<br><br>Что именно ты хочешь узнать или сделать? Расскажи подробнее — я дам максимально глубокий и разносторонний ответ.`;
        } else if (model === 'claude') {
            response.textContent = 'Claude здесь. Я проанализировал твой запрос с большой тщательностью. Чем могу помочь глубже?';
        } else if (model === 'grok') {
            response.textContent = 'Grok на связи. Говори прямо — без цензуры и политкорректности. Что нужно?';
        } else if (model === 'gpt') {
            response.textContent = 'GPT-4o готов. Какой креативный или сложный вопрос у тебя сегодня?';
        } else {
            response.textContent = 'Я в режиме выбранной модели. Расскажи подробнее о своём запросе.';
        }

        chatBody.appendChild(response);
        chatBody.scrollTop = chatBody.scrollHeight;
    }, 1200);
}

// Закрытие по клику вне окна
document.getElementById('chatModal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
});
</script>
</body>
</html>
