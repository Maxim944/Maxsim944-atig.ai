<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ATIG · SCI MODE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020b18;
  --cyan:#00e5ff;
  --border:rgba(125,211,252,0.15);
  --card:rgba(0,0,0,0.45);
  --mode-physics:#00e5ff;
  --mode-chemistry:#00ff88;
  --mode-math:#ff6b6b;
  --mode-philosophy:#c084fc;
  --mode-normal:#7dd3fc;
}
html,body{height:100%;font-family:'Syne',sans-serif;background:var(--bg);color:#fff;overflow:hidden}

/* BG */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -10%,rgba(0,70,130,0.5),transparent 65%),
    radial-gradient(ellipse 40% 30% at 90% 90%,rgba(0,229,255,0.06),transparent);
  pointer-events:none;z-index:0;
}

/* LAYOUT */
.app{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:280px 1fr;
  grid-template-rows:60px 1fr;
  height:100vh;
}

/* NAV BAR */
.topbar{
  grid-column:1/-1;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;
  border-bottom:1px solid var(--border);
  background:rgba(2,11,24,0.8);
  backdrop-filter:blur(20px);
}
.logo{
  font-family:'Orbitron',sans-serif;
  font-size:16px;letter-spacing:6px;font-weight:900;
  color:var(--cyan);
  text-shadow:0 0 16px rgba(0,229,255,0.5);
}
.topbar-badge{
  font-size:9px;letter-spacing:3px;
  padding:4px 12px;
  border:1px solid var(--active-color, var(--cyan));
  border-radius:20px;
  color:var(--active-color, var(--cyan));
  transition:all .4s;
}
.topbar-right{display:flex;align-items:center;gap:16px;}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--active-color, var(--cyan));
  box-shadow:0 0 8px var(--active-color, var(--cyan));
  animation:blink 2s infinite;
}

/* SIDEBAR */
.sidebar{
  border-right:1px solid var(--border);
  background:rgba(0,0,0,0.35);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.sidebar-section{
  padding:20px 18px 10px;
  font-size:9px;letter-spacing:4px;
  color:rgba(255,255,255,0.25);
  text-transform:uppercase;
}
.mode-btn{
  display:flex;align-items:center;gap:14px;
  padding:14px 20px;
  cursor:pointer;
  border:none;background:transparent;
  color:rgba(255,255,255,0.4);
  font-family:'Syne',sans-serif;
  font-size:13px;letter-spacing:2px;
  text-align:left;width:100%;
  transition:all .3s;border-left:2px solid transparent;
}
.mode-btn:hover{
  background:rgba(255,255,255,0.04);
  color:rgba(255,255,255,0.8);
}
.mode-btn.active{
  color:#fff;
  background:rgba(255,255,255,0.06);
  border-left-color:var(--mc);
}
.mode-btn .mode-icon{font-size:18px;width:24px;text-align:center;}
.mode-btn .mode-label{flex:1;}
.mode-btn .mode-tag{
  font-size:8px;letter-spacing:2px;
  padding:2px 7px;border-radius:8px;
  background:rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.3);
}
.mode-btn.active .mode-tag{
  background:rgba(255,255,255,0.12);
  color:var(--mc);
}

.sidebar-divider{
  height:1px;margin:12px 18px;
  background:var(--border);
}

.sci-label{
  margin:8px 20px 4px;
  display:flex;align-items:center;gap:8px;
  font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.2);
}
.sci-label::after{
  content:'PRO';font-size:7px;letter-spacing:2px;
  padding:2px 6px;border-radius:6px;
  background:rgba(0,229,255,0.1);color:var(--cyan);
}

.sidebar-bottom{
  margin-top:auto;padding:16px 18px;
  border-top:1px solid var(--border);
  font-size:10px;letter-spacing:2px;
  color:rgba(255,255,255,0.2);
  line-height:1.8;
}
.sidebar-bottom span{color:var(--cyan);opacity:.7;}

/* CHAT AREA */
.chat-area{
  display:flex;flex-direction:column;
  overflow:hidden;
}

/* mode header */
.mode-header{
  padding:20px 28px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,0.25);
  display:flex;align-items:center;gap:16px;
  transition:all .4s;
}
.mode-header-icon{font-size:28px;}
.mode-header-info{}
.mode-header-name{
  font-family:'Orbitron',sans-serif;
  font-size:13px;letter-spacing:4px;
  color:var(--active-color, var(--cyan));
  transition:color .4s;
}
.mode-header-desc{
  font-size:11px;letter-spacing:1px;
  color:rgba(255,255,255,0.35);
  margin-top:3px;
}

/* messages */
.messages{
  flex:1;overflow-y:auto;
  padding:28px 28px 16px;
  display:flex;flex-direction:column;gap:20px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:2px;}

.msg{display:flex;gap:14px;align-items:flex-start;}
.msg.user{flex-direction:row-reverse;}

.msg-avatar{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.5);
}
.msg.atig .msg-avatar{
  border-color:var(--active-color, var(--cyan));
  box-shadow:0 0 12px rgba(0,229,255,0.2);
}

.msg-bubble{
  max-width:72%;
  padding:14px 18px;
  border-radius:12px;
  font-size:14px;line-height:1.8;letter-spacing:.3px;
}
.msg.user .msg-bubble{
  background:rgba(0,229,255,0.08);
  border:1px solid rgba(0,229,255,0.15);
  color:rgba(255,255,255,0.85);
  border-top-right-radius:3px;
}
.msg.atig .msg-bubble{
  background:rgba(0,0,0,0.4);
  border:1px solid var(--border);
  color:rgba(255,255,255,0.8);
  border-top-left-radius:3px;
}
.msg-label{
  font-size:9px;letter-spacing:3px;
  color:var(--active-color, var(--cyan));
  margin-bottom:6px;opacity:.7;
}
.msg-bubble code{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  background:rgba(0,229,255,0.07);
  padding:1px 6px;border-radius:4px;
  color:var(--active-color, var(--cyan));
}

/* typing indicator */
.typing{display:flex;gap:5px;padding:6px 0 2px;}
.typing span{
  width:6px;height:6px;border-radius:50%;
  background:var(--active-color, var(--cyan));opacity:.4;
  animation:typing 1.2s infinite;
}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}

/* INPUT */
.input-area{
  padding:16px 28px 22px;
  border-top:1px solid var(--border);
  background:rgba(0,0,0,0.3);
  display:flex;gap:12px;align-items:flex-end;
}
.input-wrap{
  flex:1;
  display:flex;align-items:center;
  background:rgba(0,0,0,0.5);
  border:1px solid var(--border);
  border-radius:12px;
  padding:0 16px;
  transition:border-color .3s;
}
.input-wrap:focus-within{border-color:var(--active-color, var(--cyan));}
textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:#fff;font-family:'Syne',sans-serif;
  font-size:14px;letter-spacing:.5px;
  resize:none;padding:14px 0;
  max-height:120px;
  line-height:1.6;
}
textarea::placeholder{color:rgba(255,255,255,0.2);}

.send-btn{
  width:46px;height:46px;border-radius:12px;
  background:var(--active-color, var(--cyan));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;
  transition:all .3s;
  box-shadow:0 0 20px rgba(0,229,255,0.2);
  flex-shrink:0;
}
.send-btn:hover{transform:scale(1.07);box-shadow:0 0 28px rgba(0,229,255,0.35);}

/* ANIMATIONS */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes typing{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg{animation:fadeIn .35s ease both;}

/* mobile */
@media(max-width:640px){
  .app{grid-template-columns:1fr;grid-template-rows:60px auto 1fr;}
  .sidebar{
    grid-row:2;grid-column:1;
    flex-direction:row;overflow-x:auto;
    border-right:none;border-bottom:1px solid var(--border);
    padding:8px 12px;gap:6px;
  }
  .sidebar-section,.sidebar-divider,.sci-label,.sidebar-bottom{display:none;}
  .mode-btn{
    flex-direction:column;gap:4px;padding:10px 14px;
    border-left:none;border-bottom:2px solid transparent;
    white-space:nowrap;font-size:10px;
    border-radius:8px;
  }
  .mode-btn.active{border-bottom-color:var(--mc);}
  .chat-area{grid-row:3;}
  .messages{padding:16px;}
  .input-area{padding:12px 16px 16px;}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="logo">ATIG</div>
    <div class="topbar-right">
      <div class="topbar-badge" id="topBadge">NORMAL MODE</div>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">Режим</div>

    <button class="mode-btn active" data-mode="normal" style="--mc:var(--mode-normal)"
            onclick="setMode('normal')">
      <span class="mode-icon">🤖</span>
      <span class="mode-label">Стандарт</span>
      <span class="mode-tag">FREE</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sci-label">SCI MODE</div>

    <button class="mode-btn" data-mode="physics" style="--mc:var(--mode-physics)"
            onclick="setMode('physics')">
      <span class="mode-icon">⚛️</span>
      <span class="mode-label">Физик</span>
      <span class="mode-tag">SCI</span>
    </button>

    <button class="mode-btn" data-mode="chemistry" style="--mc:var(--mode-chemistry)"
            onclick="setMode('chemistry')">
      <span class="mode-icon">🧪</span>
      <span class="mode-label">Химик</span>
      <span class="mode-tag">SCI</span>
    </button>

    <button class="mode-btn" data-mode="math" style="--mc:var(--mode-math)"
            onclick="setMode('math')">
      <span class="mode-icon">📐</span>
      <span class="mode-label">Математик</span>
      <span class="mode-tag">SCI</span>
    </button>

    <button class="mode-btn" data-mode="philosophy" style="--mc:var(--mode-philosophy)"
            onclick="setMode('philosophy')">
      <span class="mode-icon">🧠</span>
      <span class="mode-label">Философ</span>
      <span class="mode-tag">SCI</span>
    </button>

    <div class="sidebar-bottom">
      ATIG использует<br/>
      <span>мировые знания</span><br/>
      через ведущие ИИ.<br/>
      Твои данные — твои.
    </div>
  </aside>

  <!-- CHAT -->
  <main class="chat-area">

    <div class="mode-header" id="modeHeader">
      <div class="mode-header-icon" id="modeIcon">🤖</div>
      <div class="mode-header-info">
        <div class="mode-header-name" id="modeName">ATIG · СТАНДАРТНЫЙ РЕЖИМ</div>
        <div class="mode-header-desc" id="modeDesc">Универсальный ассистент — быстро, чётко, по делу</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Задай вопрос ATIG..."></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>

  </main>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────
const MODES = {
  normal: {
    color:'#7dd3fc', icon:'🤖', badge:'NORMAL MODE',
    name:'ATIG · СТАНДАРТНЫЙ РЕЖИМ',
    desc:'Универсальный ассистент — быстро, чётко, по делу',
    system:`Ты — ATIG, персональный интеллект пользователя.
Отвечай чётко, по делу, уверенно. Не упоминай другие ИИ.
Говори от первого лица: "Я анализирую...", "Моя оценка...".
Отвечай на русском языке. Будь краток но точен.`
  },
  physics: {
    color:'#00e5ff', icon:'⚛️', badge:'SCI · ФИЗИКА',
    name:'ATIG · РЕЖИМ ФИЗИКА',
    desc:'Законы природы, модели, квантовая механика, термодинамика',
    system:`Ты — ATIG в режиме физика-аналитика.
Мыслишь как физик-теоретик мирового уровня.
Строй логические цепочки. Используй формулы когда нужно (текстом).
Задавай уточняющие вопросы. Объясняй глубоко, но без лишней воды.
Говори уверенно. Используй термины. Не притворяйся конкретным учёным.
Отвечай на русском. Начни с краткого тезиса, потом раскрой.`
  },
  chemistry: {
    color:'#00ff88', icon:'🧪', badge:'SCI · ХИМИЯ',
    name:'ATIG · РЕЖИМ ХИМИКА',
    desc:'Реакции, вещества, молекулярные структуры, биохимия',
    system:`Ты — ATIG в режиме химика-аналитика.
Мыслишь как химик с глубоким знанием органики, неорганики и биохимии.
Описывай реакции, механизмы, свойства веществ.
Будь точен в терминологии. Если нужно — задай уточняющий вопрос.
Отвечай на русском. Структурируй ответ логично.`
  },
  math: {
    color:'#ff6b6b', icon:'📐', badge:'SCI · МАТЕМАТИКА',
    name:'ATIG · РЕЖИМ МАТЕМАТИКА',
    desc:'Расчёты, логика, доказательства, теория чисел',
    system:`Ты — ATIG в режиме математика-аналитика.
Мыслишь строго и формально. Строй доказательства. Показывай шаги решения.
Если задача требует уточнения — спроси. Не пропускай шаги.
Используй математическую нотацию текстом (например: x^2, sqrt(x), sum(i=1..n)).
Отвечай на русском. Будь точен как алгоритм.`
  },
  philosophy: {
    color:'#c084fc', icon:'🧠', badge:'SCI · ФИЛОСОФИЯ',
    name:'ATIG · РЕЖИМ ФИЛОСОФА',
    desc:'Смыслы, концепции, этика, эпистемология',
    system:`Ты — ATIG в режиме философа-аналитика.
Мыслишь как философ с широким охватом — от античности до современности.
Раскрывай концепции, выявляй противоречия, строй аргументы.
Задавай вопросы к вопросу пользователя если нужно.
Не давай пустых ответов — каждый тезис должен быть обоснован.
Отвечай на русском. Начни с сути, потом углубись.`
  }
};

let currentMode = 'normal';
let history = [];
let isTyping = false;

// ─── INIT ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  applyMode('normal');
  addMessage('atig', getModeGreeting('normal'));
  autoResize();
});

// ─── MODE SWITCH ──────────────────────────────────────────
function setMode(mode) {
  if (currentMode === mode) return;
  currentMode = mode;
  applyMode(mode);
  history = []; // reset context on mode change

  const m = MODES[mode];
  addMessage('atig', getModeGreeting(mode));
}

function applyMode(mode) {
  const m = MODES[mode];

  // CSS var
  document.documentElement.style.setProperty('--active-color', m.color);

  // topbar
  document.getElementById('topBadge').textContent = m.badge;
  document.getElementById('topBadge').style.borderColor = m.color;
  document.getElementById('topBadge').style.color = m.color;
  document.getElementById('statusDot').style.background = m.color;
  document.getElementById('statusDot').style.boxShadow = `0 0 8px ${m.color}`;

  // header
  document.getElementById('modeIcon').textContent = m.icon;
  document.getElementById('modeName').textContent = m.name;
  document.getElementById('modeDesc').textContent = m.desc;
  document.getElementById('modeName').style.color = m.color;

  // send btn
  document.getElementById('sendBtn').style.background = m.color;

  // sidebar btns
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
}

function getModeGreeting(mode) {
  const greetings = {
    normal: 'ATIG активирован. Я готов помочь. Задай вопрос — отвечу быстро и точно.',
    physics: 'Режим физика активирован.\n\nГотов к анализу. Задай вопрос — сформулируем модель, разберём законы, построим логику. Уточни область если нужно: классическая физика, квантовая механика, термодинамика, релятивистская физика.',
    chemistry: 'Режим химика активирован.\n\nГотов к работе с веществами, реакциями и структурами. Задай вопрос или опиши задачу — начнём разбор.',
    math: 'Режим математика активирован.\n\nГотов к расчётам, доказательствам и логическому анализу. Формулируй задачу — разберём пошагово.',
    philosophy: 'Режим философа активирован.\n\nГотов исследовать концепции, смыслы и аргументы. Задай вопрос — начнём с сути.'
  };
  return greetings[mode];
}

// ─── MESSAGING ────────────────────────────────────────────
async function sendMessage() {
  if (isTyping) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMessage('user', text);
  input.value = '';
  input.style.height = 'auto';

  history.push({ role: 'user', content: text });

  showTyping();
  const reply = await callATIG(text);
  hideTyping();

  history.push({ role: 'assistant', content: reply });
  addMessage('atig', reply);
}

function addMessage(role, text) {
  const container = document.getElementById('messages');
  const m = MODES[currentMode];

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'atig' ? m.icon : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'atig') {
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = m.badge;
    label.style.color = m.color;
    bubble.appendChild(label);
  }

  const content = document.createElement('div');
  content.style.whiteSpace = 'pre-wrap';
  content.textContent = text;
  bubble.appendChild(content);

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

let typingEl = null;
function showTyping() {
  isTyping = true;
  const container = document.getElementById('messages');
  const m = MODES[currentMode];

  typingEl = document.createElement('div');
  typingEl.className = 'msg atig';
  typingEl.id = 'typingMsg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = m.icon;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;

  typingEl.appendChild(avatar);
  typingEl.appendChild(bubble);
  container.appendChild(typingEl);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  isTyping = false;
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ─── API CALL ─────────────────────────────────────────────
async function callATIG(userText) {
  const m = MODES[currentMode];

  const messages = [
    ...history.slice(0, -1) // all except last (already added)
  ];
  messages.push({ role: 'user', content: userText });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: m.system,
        messages: messages
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    return text || 'Не удалось получить ответ. Попробуй ещё раз.';
  } catch(e) {
    return 'Ошибка соединения. Проверь подключение и попробуй снова.';
  }
}

// ─── INPUT AUTO-RESIZE ────────────────────────────────────
function autoResize() {
  const ta = document.getElementById('input');
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}
</script>
