<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ATIG — Живая сфера</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
        }
        #btn-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }
        button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }
        button:hover {
            background: rgba(168,85,247,0.4);
            box-shadow: 0 0 25px rgba(168,85,247,0.6);
            transform: scale(1.02);
        }
        button.listening {
            background: rgba(168,85,247,0.6);
            border-color: #a855f7;
            box-shadow: 0 0 30px #a855f7;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            button { padding: 10px 20px; font-size: 14px; }
            #status { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="status">🌀 ATIG — живой интеллект</div>
    <div id="btn-container">
        <button id="mic-btn">🎤 Активировать голос</button>
    </div>
    <div id="info">✦ Сфера реагирует на твой голос ✦</div>

    <!-- Подключаем Three.js и дополнительные модули -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- Инициализация ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010105);
        scene.fog = new THREE.FogExp2(0x010105, 0.03);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        // --- Пост-эффекты (Bloom) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // --- Звёзды + частицы ---
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // --- Дополнительные мерцающие частицы вокруг сферы ---
        const particleCount = 1800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 1.7 + Math.random() * 0.6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            particlePositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            particlePositions[i*3+2] = radius * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xaa66ff, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // --- Сфера с шейдерным материалом ---
        const sphereGeom = new THREE.SphereGeometry(1.2, 256, 256);
        
        // Униформа: время и интенсивность голоса
        const uniforms = {
            uTime: { value: 0 },
            uAudioIntensity: { value: 0 },
            uGlow: { value: 0.5 }
        };
        
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 3.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            uniform float uTime;
            uniform float uAudioIntensity;
            varying vec2 vUv;
            
            void main() {
                vec2 uv = vUv;
                float pattern = sin(uv.x * 30.0 + uTime) * cos(uv.y * 30.0 + uTime);
                float pulse = sin(uTime * 3.0) * 0.2;
                float energy = pattern * 0.4 + uAudioIntensity * 0.9 + pulse;
                
                vec3 colorA = vec3(0.25, 0.12, 0.65);
                vec3 colorB = vec3(0.85, 0.25, 0.95);
                vec3 colorC = vec3(1.0, 0.55, 0.2);
                
                vec3 finalColor = mix(colorA, colorB, uv.y);
                finalColor = mix(finalColor, colorC, energy);
                
                float alpha = 0.9 + energy * 0.3;
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;
        
        const sphereMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        const sphere = new THREE.Mesh(sphereGeom, sphereMaterial);
        scene.add(sphere);
        
        // --- Лёгкое освещение ---
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xaa66ff, 0.8);
        pointLight.position.set(2, 2, 3);
        scene.add(pointLight);
        
        // --- Управление камерой с параллаксом от мыши ---
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        window.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
        });
        
        // --- Аудио система ---
        let audioContext = null;
        let mediaStream = null;
        let sourceNode = null;
        let analyserNode = null;
        let isListening = false;
        let animationId = null;
        
        const micBtn = document.getElementById('mic-btn');
        
        function updateAudioIntensity() {
            if (!isListening || !analyserNode) {
                if (!isListening) uniforms.uAudioIntensity.value = 0;
                requestAnimationFrame(updateAudioIntensity);
                return;
            }
            const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
            let avg = sum / (dataArray.length * 255);
            // Плавное изменение для красивой пульсации
            uniforms.uAudioIntensity.value = Math.min(1.0, avg * 1.5);
            
            // Пульсация сферы от голоса
            const scaleVal = 1 + uniforms.uAudioIntensity.value * 0.3;
            sphere.scale.set(scaleVal, scaleVal, scaleVal);
            
            // Изменение цвета подсветки
            const intensity = uniforms.uAudioIntensity.value;
            pointLight.intensity = 0.5 + intensity * 1.2;
            pointLight.color.setHSL(0.75 - intensity * 0.2, 1.0, 0.6);
            
            requestAnimationFrame(updateAudioIntensity);
        }
        
        async function startListening() {
            if (isListening) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaStream = stream;
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                sourceNode = audioContext.createMediaStreamSource(stream);
                analyserNode = audioContext.createAnalyser();
                analyserNode.fftSize = 256;
                sourceNode.connect(analyserNode);
                await audioContext.resume();
                isListening = true;
                micBtn.textContent = '🎙️ Слушаю... (нажми, чтобы выключить)';
                micBtn.classList.add('listening');
                
                updateAudioIntensity();
            } catch (err) {
                console.error("Ошибка доступа к микрофону:", err);
                alert("Не удалось получить доступ к микрофону. Проверьте разрешения.");
            }
        }
        
        function stopListening() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            isListening = false;
            sourceNode = null;
            analyserNode = null;
            uniforms.uAudioIntensity.value = 0;
            sphere.scale.set(1, 1, 1);
            micBtn.textContent = '🎤 Активировать голос';
            micBtn.classList.remove('listening');
        }
        
        micBtn.addEventListener('click', () => {
            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        });
        
        // --- Анимация (время, вращение сферы, параллакс, звёзды) ---
        let clock = new THREE.Clock();
        
        function animate() {
            const delta = clock.getDelta();
            const elapsedTime = performance.now() / 1000;
            
            // Обновляем шейдерное время
            uniforms.uTime.value = elapsedTime;
            
            // Вращение сферы
            sphere.rotation.y = elapsedTime * 0.15;
            sphere.rotation.x = Math.sin(elapsedTime * 0.2) * 0.1;
            
            // Вращение частиц
            particles.rotation.y = elapsedTime * 0.05;
            particles.rotation.x = elapsedTime * 0.03;
            
            // Мерцание звёзд
            stars.rotation.y += 0.0005;
            
            // Параллакс камеры от мыши
            targetX = mouseX * 0.25;
            targetY = mouseY * 0.15;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            // Эффект Bloom динамический от голоса
            if (uniforms.uAudioIntensity.value > 0.1) {
                bloomPass.strength = 0.8 + uniforms.uAudioIntensity.value * 0.7;
            } else {
                bloomPass.strength = 0.8;
            }
            
            effectComposer.render();
            requestAnimationFrame(animate);
        }
        
        animate();
        
        // Адаптация под размер окна
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Маленький эффект при загрузке
        console.log('ATIG Sphere — живой интеллект');
    </script>
</body>
</html>
