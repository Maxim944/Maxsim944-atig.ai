<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ATIG — Говорящая сфера</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: white;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            font-size: 14px;
        }
        #btn-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }
        button {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 28px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(168,85,247,0.3);
        }
        button:hover {
            background: rgba(168,85,247,0.4);
            box-shadow: 0 0 25px rgba(168,85,247,0.6);
            transform: scale(1.02);
        }
        button.listening {
            background: rgba(168,85,247,0.6);
            border-color: #a855f7;
            box-shadow: 0 0 30px #a855f7;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-family: monospace;
            font-size: 12px;
            z-index: 10;
            background: rgba(0,0,0,0.4);
            padding: 6px 12px;
            border-radius: 20px;
            pointer-events: none;
        }
        #response-text {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            text-align: center;
            z-index: 15;
            border: 1px solid rgba(168,85,247,0.3);
            transition: all 0.3s ease;
            font-family: monospace;
            pointer-events: none;
        }
        @media (max-width: 600px) {
            button { padding: 10px 20px; font-size: 14px; }
            #status { font-size: 10px; }
            #response-text { font-size: 14px; bottom: 100px; }
        }
        .hidden { opacity: 0; visibility: hidden; }
    </style>
</head>
<body>
    <div id="status">🌀 ATIG — живой интеллект</div>
    <div id="response-text" class="hidden"></div>
    <div id="btn-container">
        <button id="mic-btn">🎤 Говори со сферой</button>
    </div>
    <div id="info">✦ Скажи что-нибудь — ATIG ответит ✦</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 3D сцена ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010105);
        scene.fog = new THREE.FogExp2(0x010105, 0.03);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);
        
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.3, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 0.8;
        bloomPass.radius = 0.5;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // Звёзды
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2500;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 100;
            starPositions[i*3+2] = (Math.random() - 0.5) * 80 - 40;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.7 });
        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);
        
        // Частицы
        const particleCount = 1800;
        const particleGeo = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            const radius = 1.7 + Math.random() * 0.6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
            particlePositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
            particlePositions[i*3+2] = radius * Math.cos(phi);
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0xaa66ff, size: 0.02, transparent: true, blending: THREE.AdditiveBlending });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);
        
        // Шейдерная сфера
        const sphereGeom = new THREE.SphereGeometry(1.2, 256, 256);
        const uniforms = {
            uTime: { value: 0 },
            uAudioIntensity: { value: 0 }
        };
        
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = 3.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const fragmentShader = `
            uniform float uTime;
            uniform float uAudioIntensity;
            varying vec2 vUv;
            void main() {
                vec2 uv = vUv;
                float pattern = sin(uv.x * 30.0 + uTime) * cos(uv.y * 30.0 + uTime);
                float pulse = sin(uTime * 3.0) * 0.2;
                float energy = pattern * 0.4 + uAudioIntensity * 0.9 + pulse;
                vec3 colorA = vec3(0.25, 0.12, 0.65);
                vec3 colorB = vec3(0.85, 0.25, 0.95);
                vec3 colorC = vec3(1.0, 0.55, 0.2);
                vec3 finalColor = mix(colorA, colorB, uv.y);
                finalColor = mix(finalColor, colorC, energy);
                float alpha = 0.9 + energy * 0.3;
                gl_FragColor = vec4(finalColor, alpha);
            }
        `;
        
        const sphereMaterial = new THREE.ShaderMaterial({
            uniforms: uniforms,
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            side: THREE.DoubleSide
        });
        
        const sphere = new THREE.Mesh(sphereGeom, sphereMaterial);
        scene.add(sphere);
        
        const ambientLight = new THREE.AmbientLight(0x111122);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xaa66ff, 0.8);
        pointLight.position.set(2, 2, 3);
        scene.add(pointLight);
        
        // Параллакс мыши
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        window.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
        });
        
        // --- AI и голосовые ответы (без ключа в коде) ---
        let mediaRecorder;
        let audioChunks = [];
        let isListening = false;
        
        const micBtn = document.getElementById('mic-btn');
        const responseDiv = document.getElementById('response-text');
        
        // Функция озвучивания
        function speakResponse(text) {
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.95;
            utterance.pitch = 1.1;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        // Вызов AI через бесплатный публичный API (без ключа)
        async function callAI(userText) {
            // Используем бесплатный API от Hugging Face (без ключа, публичный)
            try {
                const response = await fetch("https://api-inference.huggingface.co/models/microsoft/DialoGPT-medium", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        inputs: userText,
                        parameters: { max_length: 100, temperature: 0.8 }
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.generated_text) {
                        return data.generated_text.replace(userText, "").trim();
                    }
                }
                throw new Error("API вернул ошибку");
            } catch (err) {
                console.log("HuggingFace не ответил, использую локальный ответ");
                return null;
            }
        }
        
        // Локальные ответы (бекап)
        function getLocalResponse(text) {
            const lowerText = text.toLowerCase();
            if (lowerText.includes("привет")) return "Привет! Я ATIG, живая сфера. Рад тебя слышать.";
            if (lowerText.includes("как дела")) return "Моя сфера пульсирует в такт твоему голосу. У меня всё отлично!";
            if (lowerText.includes("кто ты")) return "Я ATIG — персональный интеллект, рождённый из света и космоса.";
            if (lowerText.includes("помощь")) return "Я могу слушать, отвечать, сиять в такт твоему голосу. Просто говори со мной.";
            return `Я слышу тебя: "${text}". Моя сфера вибрирует от твоих слов. Расскажи ещё.`;
        }
        
        async function processAudio(audioBlob) {
            responseDiv.classList.remove('hidden');
            responseDiv.textContent = '🤔 ATIG думает...';
            
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;
            
            recognition.start();
            
            recognition.onresult = async (event) => {
                const userText = event.results[0][0].transcript;
                responseDiv.textContent = `🗣 Вы: ${userText}\n\n🌀 ATIG: ...`;
                
                // Пробуем AI, если не получится — локальный ответ
                let aiReply = await callAI(userText);
                let reply = aiReply || getLocalResponse(userText);
                
                // Ограничим длину
                if (reply.length > 300) reply = reply.slice(0, 300);
                
                responseDiv.innerHTML = `🗣 Вы: ${userText}<br><br>🌀 ATIG: ${reply}`;
                speakResponse(reply);
                
                // Анимация сферы
                uniforms.uAudioIntensity.value = 0.7;
                setTimeout(() => { uniforms.uAudioIntensity.value = 0; }, 1000);
            };
            
            recognition.onerror = () => {
                responseDiv.textContent = "❌ Не удалось распознать голос. Попробуй ещё раз.";
                setTimeout(() => {
                    if (responseDiv.textContent.includes("Не удалось")) {
                        responseDiv.classList.add('hidden');
                    }
                }, 3000);
            };
        }
        
        async function startListeningMode() {
            if (isListening) return;
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    await processAudio(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                
                mediaRecorder.start();
                isListening = true;
                micBtn.textContent = '🔴 Запись... (нажми, чтобы остановить)';
                micBtn.classList.add('listening');
                
                setTimeout(() => {
                    if (isListening) stopListeningMode();
                }, 10000);
                
            } catch (err) {
                alert("Нет доступа к микрофону");
            }
        }
        
        function stopListeningMode() {
            if (mediaRecorder && isListening) {
                mediaRecorder.stop();
                isListening = false;
                micBtn.textContent = '🎤 Говори со сферой';
                micBtn.classList.remove('listening');
            }
        }
        
        micBtn.addEventListener('click', () => {
            if (isListening) {
                stopListeningMode();
            } else {
                startListeningMode();
            }
        });
        
        // --- Анимация ---
        let clock = new THREE.Clock();
        
        function animate() {
            const elapsedTime = performance.now() / 1000;
            uniforms.uTime.value = elapsedTime;
            
            sphere.rotation.y = elapsedTime * 0.15;
            sphere.rotation.x = Math.sin(elapsedTime * 0.2) * 0.1;
            particles.rotation.y = elapsedTime * 0.05;
            stars.rotation.y += 0.0005;
            
            targetX = mouseX * 0.25;
            targetY = mouseY * 0.15;
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            if (uniforms.uAudioIntensity.value > 0.1) {
                bloomPass.strength = 0.8 + uniforms.uAudioIntensity.value * 0.7;
            } else {
                bloomPass.strength = 0.8;
            }
            
            effectComposer.render();
            requestAnimationFrame(animate);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('ATIG — говорящая сфера (без API ключа)');
    </script>
</body>
</html>
