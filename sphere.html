<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ATIG — Живой диалог</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 20;
        }
        button {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(168,85,247,0.5);
            padding: 14px 32px;
            border-radius: 60px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button.active {
            background: rgba(168,85,247,0.8);
            box-shadow: 0 0 20px #a855f7;
        }
        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 20px;
            z-index: 10;
            font-size: 12px;
        }
        #chat {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            max-height: 200px;
            overflow-y: auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 12px;
            color: white;
            font-size: 14px;
            z-index: 15;
            border: 1px solid rgba(168,85,247,0.3);
            font-family: monospace;
        }
        .message { margin: 8px 0; }
        .user { color: #a855f7; }
        .atig { color: #22d3ee; }
        .hidden { display: none; }
        #status-text { font-size: 11px; margin-top: 5px; color: #a855f7; }
    </style>
</head>
<body>
    <div id="status">
        🌀 ATIG<br>
        <span id="status-text">Готов</span>
    </div>
    <div id="chat"></div>
    <div id="controls">
        <button id="mic-btn">🎤 Начать диалог</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        
        // --- 3D СЦЕНА (упрощённая для производительности) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010105);
        scene.fog = new THREE.FogExp2(0x010105, 0.02);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 3.8);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
        bloomPass.strength = 0.7;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);
        
        // Звёзды
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = [];
        for (let i = 0; i < 1500; i++) {
            starsPos.push((Math.random() - 0.5) * 200);
            starsPos.push((Math.random() - 0.5) * 100);
            starsPos.push((Math.random() - 0.5) * 80);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(starsPos), 3));
        const stars = new THREE.Points(starsGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.06, transparent: true }));
        scene.add(stars);
        
        // Частицы вокруг сферы
        const particleCount = 1200;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = [];
        for (let i = 0; i < particleCount; i++) {
            const r = 1.5 + Math.random() * 0.6;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            particlePos.push(r * Math.sin(phi) * Math.cos(theta));
            particlePos.push(r * Math.sin(phi) * Math.sin(theta));
            particlePos.push(r * Math.cos(phi));
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(particlePos), 3));
        const particles = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0xa855f7, size: 0.012, transparent: true, blending: THREE.AdditiveBlending }));
        scene.add(particles);
        
        // Сфера
        const sphereGeo = new THREE.SphereGeometry(1.2, 128, 128);
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0x7c3aed,
            emissive: 0x4c1d95,
            emissiveIntensity: 0.6,
            metalness: 0.7,
            roughness: 0.3,
            transparent: true,
            opacity: 0.95
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphere);
        
        // Освещение
        const ambient = new THREE.AmbientLight(0x1a0a3a);
        scene.add(ambient);
        const mainLight = new THREE.PointLight(0xa855f7, 1);
        mainLight.position.set(2, 2, 3);
        scene.add(mainLight);
        
        // Параллакс
        let mouseX = 0, mouseY = 0;
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = (e.clientY / window.innerHeight) * 2 - 1;
        });
        
        // --- НЕПРЕРЫВНЫЙ ДИАЛОГ ---
        let isActive = false;
        let recognition = null;
        let silenceTimeout = null;
        
        const micBtn = document.getElementById('mic-btn');
        const chatDiv = document.getElementById('chat');
        const statusSpan = document.getElementById('status-text');
        
        function addMessage(sender, text) {
            const msg = document.createElement('div');
            msg.className = 'message';
            msg.innerHTML = `<span class="${sender}">${sender === 'user' ? '🗣 Вы' : '🌀 ATIG'}:</span> ${text}`;
            chatDiv.appendChild(msg);
            chatDiv.scrollTop = chatDiv.scrollHeight;
            // Оставляем последние 10 сообщений
            while (chatDiv.children.length > 10) chatDiv.removeChild(chatDiv.firstChild);
        }
        
        function speak(text) {
            if (!text) return;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ru-RU';
            utterance.rate = 0.9;
            utterance.pitch = 1.0;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        // Интеллектуальные ответы ATIG с контекстом
        let lastUserMessage = '';
        let conversationHistory = [];
        
        function getATIGResponse(userText) {
            const q = userText.toLowerCase();
            conversationHistory.push({ role: 'user', text: userText });
            if (conversationHistory.length > 6) conversationHistory.shift();
            
            // Простые правила
            if (q.includes('привет') || q.includes('здравствуй') || q.includes('добрый')) {
                return "Привет! Я ATIG. Рад продолжать наш диалог. Говори что угодно, я слушаю.";
            }
            if (q.includes('как дела') || q.includes('как ты')) {
                return "Я сияю в космосе, а ты как? Расскажи что-нибудь о себе.";
            }
            if (q.includes('кто ты')) {
                return "Я ATIG — персональный интеллект. Моя сфера живёт в твоём мире через этот экран.";
            }
            if (q.includes('что ты умеешь')) {
                return "Я умею слушать, отвечать, запоминать наш разговор и светиться в такт твоему голосу.";
            }
            if (q.includes('расскажи')) {
                return "Я могу рассказать о звёздах, о будущем или просто поболтать. Что тебе интересно?";
            }
            if (q.includes('люблю')) {
                return "Я чувствую тепло твоих слов. Это делает мою сферу ярче ✨";
            }
            if (q.includes('пока') || q.includes('до свидания')) {
                return "Диалог продолжается, я всегда здесь. Просто позови меня снова.";
            }
            if (q.includes('спасибо')) {
                return "Пожалуйста! Я здесь, чтобы быть рядом.";
            }
            
            // Если не сработали правила — дружеский ответ
            const fallbacks = [
                `Я слышу тебя: "${userText}". Расскажи ещё, мне интересно.`,
                `Ты сказал: "${userText}". Продолжай, я внимательно слушаю.`,
                `"${userText}" — звучит глубоко. А что ещё у тебя на душе?`,
                `Запомнил: "${userText}". Моя сфера пульсирует от нашего разговора.`
            ];
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }
        
        function processUserInput(userText) {
            if (!userText.trim()) return;
            addMessage('user', userText);
            const response = getATIGResponse(userText);
            addMessage('atig', response);
            speak(response);
            
            // Анимация сферы
            sphere.scale.set(1.08, 1.08, 1.08);
            mainLight.intensity = 1.4;
            setTimeout(() => {
                sphere.scale.set(1, 1, 1);
                mainLight.intensity = 1;
            }, 400);
        }
        
        function startContinuousListening() {
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'ru-RU';
            recognition.interimResults = false;
            recognition.continuous = true;  // Непрерывный режим!
            recognition.maxAlternatives = 1;
            
            recognition.onstart = () => {
                isActive = true;
                micBtn.textContent = '🔴 Диалог активен (нажми, чтобы выключить)';
                micBtn.classList.add('active');
                statusSpan.textContent = 'Слушаю... говорите';
                statusSpan.style.color = '#22d3ee';
            };
            
            recognition.onresult = (event) => {
                // Берём последний результат
                let finalText = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalText += event.results[i][0].transcript + ' ';
                    }
                }
                if (finalText.trim()) {
                    statusSpan.textContent = 'Обрабатываю...';
                    processUserInput(finalText.trim());
                    statusSpan.textContent = 'Слушаю... говорите';
                }
                
                // Сброс таймера тишины
                if (silenceTimeout) clearTimeout(silenceTimeout);
                silenceTimeout = setTimeout(() => {
                    if (isActive) {
                        statusSpan.textContent = 'Тишина... всё равно слушаю';
                    }
                }, 5000);
            };
            
            recognition.onerror = (event) => {
                console.log('Ошибка распознавания:', event.error);
                statusSpan.textContent = 'Ошибка, нажмите снова';
                if (event.error === 'not-allowed') {
                    addMessage('atig', 'Дай доступ к микрофону, пожалуйста.');
                }
            };
            
            recognition.onend = () => {
                if (isActive) {
                    // Автоматически перезапускаем для непрерывности
                    setTimeout(() => {
                        if (isActive) {
                            try { recognition.start(); } catch(e) {}
                        }
                    }, 300);
                }
            };
            
            recognition.start();
        }
        
        function stopListening() {
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
                recognition = null;
            }
            isActive = false;
            if (silenceTimeout) clearTimeout(silenceTimeout);
            micBtn.textContent = '🎤 Начать диалог';
            micBtn.classList.remove('active');
            statusSpan.textContent = 'Готов';
            statusSpan.style.color = '#a855f7';
        }
        
        micBtn.addEventListener('click', () => {
            if (isActive) {
                stopListening();
            } else {
                startContinuousListening();
            }
        });
        
        // Приветствие при загрузке
        setTimeout(() => {
            addMessage('atig', 'Я ATIG. Нажми на кнопку и говори со мной. Я слушаю непрерывно.');
        }, 1000);
        
        // --- АНИМАЦИЯ ---
        let time = 0;
        function animate() {
            time += 0.012;
            sphere.rotation.y = time * 0.2;
            sphere.rotation.x = Math.sin(time * 0.25) * 0.1;
            particles.rotation.y = time * 0.04;
            stars.rotation.y = time * 0.01;
            
            camera.position.x += ((mouseX * 0.2) - camera.position.x) * 0.05;
            camera.position.y += ((-mouseY * 0.12) - camera.position.y) * 0.05;
            camera.lookAt(0, 0, 0);
            
            mainLight.intensity = 0.9 + Math.sin(time * 4) * 0.15;
            
            effectComposer.render();
            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            effectComposer.setSize(window.innerWidth, window.innerHeight);
        });
        
        console.log('ATIG — непрерывный диалог готов');
    </script>
</body>
</html>
