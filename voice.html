<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IG Sphere v1</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at center, #05070d, #000000);
        font-family: Arial, sans-serif;
        color: white;
    }
    canvas { display: block; }#ui {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
}

.btn {
    padding: 10px 16px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: rgba(255,255,255,0.15);
}

#title {
    position: absolute;
    top: 20px;
    left: 20px;
    opacity: 0.7;
    font-size: 14px;
    letter-spacing: 2px;
}

</style>
</head>
<body><div id="title">IG-01 • CINEMATIC SPHERE</div>
<div id="ui">
    <div class="btn" onclick="pulse()">Pulse</div>
    <div class="btn" onclick="rotateSpeed += 0.002">Speed +</div>
    <div class="btn" onclick="rotateSpeed = Math.max(0.001, rotateSpeed - 0.002)">Speed -</div>
</div><script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script><script>
let scene, camera, renderer;
let sphere, particles;
let rotateSpeed = 0.002;
let clock = new THREE.Clock();

init();
animate();

function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.z = 6;

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // LIGHT
    const light = new THREE.PointLight(0x66ccff, 2, 50);
    light.position.set(5, 5, 5);
    scene.add(light);

    const ambient = new THREE.AmbientLight(0x222233);
    scene.add(ambient);

    // SPHERE CORE
    const geometry = new THREE.SphereGeometry(1.5, 128, 128);

    const material = new THREE.MeshStandardMaterial({
        color: 0x111827,
        emissive: 0x00aaff,
        emissiveIntensity: 0.8,
        metalness: 0.2,
        roughness: 0.3
    });

    sphere = new THREE.Mesh(geometry, material);
    scene.add(sphere);

    // PARTICLES
    const pGeometry = new THREE.BufferGeometry();
    const pCount = 2000;
    const positions = [];

    for (let i = 0; i < pCount; i++) {
        positions.push((Math.random() - 0.5) * 50);
        positions.push((Math.random() - 0.5) * 50);
        positions.push((Math.random() - 0.5) * 50);
    }

    pGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

    const pMaterial = new THREE.PointsMaterial({
        color: 0x88ccff,
        size: 0.05,
        transparent: true,
        opacity: 0.6
    });

    particles = new THREE.Points(pGeometry, pMaterial);
    scene.add(particles);

    window.addEventListener('resize', onResize);
}

function animate() {
    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    sphere.rotation.y += rotateSpeed;
    sphere.rotation.x += rotateSpeed * 0.3;

    particles.rotation.y += 0.0003;

    // breathing core
    sphere.scale.setScalar(1 + Math.sin(t * 2) * 0.03);

    renderer.render(scene, camera);
}

function pulse() {
    sphere.material.emissiveIntensity = 2;

    setTimeout(() => {
        sphere.material.emissiveIntensity = 0.8;
    }, 300);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script></body>
</html>
